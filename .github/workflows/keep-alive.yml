name: Keep Supabase Alive

# 每天向 Supabase 做一次写操作，防止免费版项目因 7 天无活动被自动暂停
# 旧版只做 SELECT 读查询，Supabase 不计为"活跃" — 现改为 UPSERT+DELETE 写操作

on:
  schedule:
    # 每天 UTC 00:30（北京时间 08:30）执行
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write to Supabase to keep project active
        run: |
          SUPABASE_URL="https://rghlkwmarqfyksaztang.supabase.co"
          SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnaGxrd21hcnFmeWtzYXp0YW5nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwODk5MTcsImV4cCI6MjA4OTY2NTkxN30.cbwWMVYhPpOuqFcU1ZzvB0Y_S7tqK_E8tBJMBwGebis"

          echo "=== Keep-alive at $(date -u) ==="

          # 1. UPSERT: 写入一条哨兵记录（触发真正的数据库写入）
          UPSERT=$(curl -s -o /tmp/upsert.txt -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/institutions" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d '[{"id":"inst_keepalive","name":"_KEEPALIVE","products":[]}]')
          echo "UPSERT: $UPSERT"

          # 2. DELETE: 立即清理哨兵记录（不留垃圾数据）
          DELETE=$(curl -s -o /tmp/delete.txt -w "%{http_code}" \
            -X DELETE \
            "$SUPABASE_URL/rest/v1/institutions?id=eq.inst_keepalive" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "DELETE: $DELETE"

          # 3. SELECT: 验证数据库可达
          READ=$(curl -s -o /tmp/read.txt -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/institutions?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")
          echo "READ:   $READ"

          if [ "$READ" -ge 200 ] && [ "$READ" -lt 300 ]; then
            echo "✅ Supabase is alive"
          else
            echo "❌ Ping failed — UPSERT=$UPSERT DELETE=$DELETE READ=$READ"
            exit 1
          fi
