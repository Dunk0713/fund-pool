<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>中欧基金 · 机构产品池查询</title>

  <!-- ═══════════════════════════════════════════════════════════════
       Core dependencies (always needed)
       ═══════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Tesseract.js & PDF.js are lazy-loaded on demand — see Section 2 in JS -->

  <style>
    /* ═══════════════════════════════════════════════════════════════
       Section 1 · Design Tokens & Reset
       ═══════════════════════════════════════════════════════════════ */

    /* ── 1.1 CSS Variables ─────────────────────────────────────── */
    :root {
      /* Brand — 深青黛 × 暖铜金 */
      --brand-ink: #0F2A3F;
      --brand-ink-hover: #173B57;
      --brand-ink-active: #0A1D2C;
      --brand-accent: #B8935A;
      --brand-accent-soft: #F2EBDC;
      --brand-tint: #EEF2F5;

      /* Semantic — 红涨绿跌 (降饱和) */
      --pos: #C0392B;
      --pos-soft: #FBEDEA;
      --neg: #1E7F5C;
      --neg-soft: #E8F2EE;
      --warn: #B46A00;
      --warn-soft: #FBF2E1;
      --ok: #1E7F5C;
      --ok-soft: #E8F2EE;
      --info: #2C5E8F;
      --info-soft: #EBF1F7;

      /* Neutral 9-step */
      --ink-900: #0B1520;
      --ink-800: #1A2433;
      --ink-600: #47556B;
      --ink-500: #6B7789;
      --ink-400: #94A0B3;
      --ink-300: #C5CDD8;
      --ink-200: #E1E6ED;
      --ink-100: #F0F3F7;
      --ink-050: #F7F9FB;
      --paper: #FFFFFF;

      /* Type scale — 6 tiers */
      --fs-display: 26px;
      --lh-display: 32px;
      --fs-h1: 18px;
      --lh-h1: 26px;
      --fs-h2: 15px;
      --lh-h2: 22px;
      --fs-body: 14px;
      --lh-body: 20px;
      --fs-sm: 13px;
      --lh-sm: 18px;
      --fs-xs: 11px;
      --lh-xs: 14px;

      /* Spacing — 8pt grid */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 24px;
      --sp-6: 32px;

      /* Radius — 3 tiers */
      --r-sm: 4px;
      --r-md: 8px;
      --r-lg: 12px;

      /* Shadow — outlined-card style */
      --sh-1: 0 1px 0 rgba(15,42,63,.06), 0 1px 2px rgba(15,42,63,.04);
      --sh-2: 0 2px 4px rgba(15,42,63,.06), 0 4px 12px rgba(15,42,63,.08);
      --sh-3: 0 8px 24px rgba(15,42,63,.12);

      /* Motion */
      --dur-fast: 120ms;
      --dur: 180ms;
      --dur-slow: 280ms;
      --ease: cubic-bezier(0.2, 0, 0, 1);

      /* ── Legacy aliases (preserve backward compat) ─────────── */
      --primary: var(--brand-ink);
      --primary-light: var(--brand-tint);
      --success: var(--ok);
      --success-bg: var(--ok-soft);
      --danger: var(--pos);
      --danger-bg: var(--pos-soft);
      --bg: var(--ink-100);
      --card: var(--paper);
      --text: var(--ink-800);
      --text-secondary: var(--ink-600);
      --text-tertiary: var(--ink-500);
      --border: var(--ink-200);
      --radius: var(--r-lg);
      --radius-sm: var(--r-md);
      --shadow: var(--sh-1);
      --shadow-md: var(--sh-2);
      --transition: var(--dur) var(--ease);
    }

    /* ── 1.2 Reset & Base ──────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      font-variant-numeric: tabular-nums;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* Tabular nums for all digit-heavy elements */
    .num, .product-code, .fund-code, td, th, input[type="number"] {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    #app {
      min-height: 100vh;
      padding-bottom: 94px; /* 72px bottom-nav + 22px compliance bar */
    }

    /* ═══════════════════════════════════════════════════════════════
       Section 2 · Layout
       ═══════════════════════════════════════════════════════════════ */

    /* ── 2.1 Header ────────────────────────────────────────────── */
    .header {
      background: var(--card);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      min-width: 0;
    }
    .header h1 {
      font-size: var(--fs-h2);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
      line-height: 1.3;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 span {
      color: var(--brand-ink);
    }
    .header-logo-mark {
      width: 24px;
      height: 24px;
      border-radius: var(--r-sm);
      background: var(--brand-ink);
      color: var(--paper);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .header-subtitle {
      font-size: var(--fs-xs);
      color: var(--text-secondary);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-role-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 500;
      background: var(--brand-tint);
      color: var(--brand-ink);
      border-radius: var(--r-sm);
      letter-spacing: 0.3px;
    }
    .header-data-stamp {
      font-size: 10px;
      color: var(--ink-500);
      font-variant-numeric: tabular-nums;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }
    .logout-btn {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }
    .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* ── 2.2 Container ─────────────────────────────────────────── */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ── 2.3 Bottom Navigation ─────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 22px; /* leave room for compliance bar */
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 8px;
      z-index: 200;
    }
    /* 合规条 — 全站常驻底部 22px */
    .compliance-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 22px;
      padding: 0 12px;
      background: var(--ink-100);
      border-top: 1px solid var(--ink-200);
      color: var(--ink-500);
      font-size: var(--fs-xs);
      line-height: 22px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 201;
      letter-spacing: 0.2px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 14px 4px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--ink-500);
      font-size: var(--fs-xs);
      font-weight: 500;
      transition: color var(--dur) var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 28px;
      height: 2px;
      background: var(--brand-ink);
      border-radius: 0 0 2px 2px;
      transition: transform var(--dur) var(--ease);
    }
    .nav-item.active {
      color: var(--brand-ink);
    }
    .nav-item.active::before {
      transform: translateX(-50%) scaleX(1);
    }
    .nav-item svg { width: 22px; height: 22px; stroke-width: 1.5; }

    /* ═══════════════════════════════════════════════════════════════
       Section 3 · Components
       ═══════════════════════════════════════════════════════════════ */

    /* ── 3.1 Cards (outlined style) ─────────────────────────────── */
    .card {
      background: var(--paper);
      border: 1px solid var(--ink-200);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-1);
      padding: var(--sp-5);
      margin-bottom: var(--sp-3);
    }
    .inst-card {
      background: var(--paper);
      border: 1px solid var(--ink-200);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-1);
      margin-bottom: var(--sp-3);
      overflow: hidden;
      transition: border-color var(--dur) var(--ease);
    }
    .inst-card:hover {
      border-color: var(--ink-300);
    }
    .inst-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      transition: background var(--transition);
    }
    .inst-header:active { background: #f9fafb; }
    .inst-name {
      font-size: 16px;
      font-weight: 600;
    }
    .inst-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .inst-actions {
      display: flex;
      gap: 8px;
    }
    .result-card {
      position: relative;
      padding: var(--sp-4) var(--sp-5) var(--sp-4) var(--sp-5);
      padding-left: calc(var(--sp-5) + 4px);
      background: var(--paper);
      border: 1px solid var(--ink-200);
      border-radius: var(--r-lg);
      margin-top: var(--sp-4);
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
      transform: translateY(4px);
      opacity: 0;
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      box-shadow: var(--sh-1);
    }
    .result-card.visible {
      transform: translateY(0);
      opacity: 1;
    }
    .result-card::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 4px;
      border-radius: var(--r-lg) 0 0 var(--r-lg);
    }
    .result-card.investable::before { background: var(--ok); }
    .result-card.not-investable::before { background: var(--warn); }
    /* 头部：状态 chip */
    .result-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px 3px 8px;
      border-radius: 999px;
      font-size: var(--fs-xs);
      font-weight: 600;
      letter-spacing: 0.3px;
      width: fit-content;
      border: 1px solid transparent;
    }
    .result-card.investable .result-chip {
      background: rgba(30, 132, 73, 0.08);
      color: var(--ok);
      border-color: rgba(30, 132, 73, 0.2);
    }
    .result-card.not-investable .result-chip {
      background: var(--warn-soft);
      color: var(--warn);
      border-color: rgba(180, 106, 0, 0.2);
    }
    .result-chip .result-icon {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .result-chip .result-icon svg { width: 14px; height: 14px; stroke-width: 2.2; }
    /* 主标题：基金代码 + 名称 */
    .result-detail {
      font-size: 15px;
      line-height: 1.45;
      color: var(--ink-900);
      font-weight: 600;
      letter-spacing: -0.1px;
    }
    .result-detail .fund-code {
      font-variant-numeric: tabular-nums;
      color: var(--ink-700);
      font-weight: 500;
      margin-right: 6px;
    }
    /* 兼容：隐藏旧的大字 result-text（仅 not-investable 分支保留为提示语） */
    .result-text.na-hint {
      font-size: var(--fs-sm);
      color: var(--text-secondary);
      font-weight: 400;
      line-height: var(--lh-sm);
    }

    /* ── Fund Tags (semantic 3-color system) ───────────────────── */
    .fund-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      margin-top: var(--sp-1);
      animation: fadeInTags var(--dur) var(--ease);
    }
    @keyframes fadeInTags {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fund-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--r-sm);
      font-size: var(--fs-xs);
      line-height: 1.6;
      font-weight: 500;
      white-space: nowrap;
      border: 1px solid transparent;
      letter-spacing: 0.1px;
    }
    /* Neutral — 大多数事实性标签（类型、经理、成立年限） */
    .tag-blue, .tag-gray {
      background: var(--ink-100);
      color: var(--ink-800);
      border-color: var(--ink-200);
    }
    /* Emphasis — 强调（规模、收益等关键指标） */
    .tag-green, .tag-gold {
      background: var(--brand-tint);
      color: var(--brand-ink);
      border-color: var(--ink-200);
    }
    /* Caution — 风险/警示（小规模、QDII、经理变更等） */
    .tag-amber, .tag-orange, .tag-red {
      background: var(--warn-soft);
      color: var(--warn);
      border-color: rgba(180,106,0,.2);
    }

    .fund-tags-loading {
      display: flex;
      gap: var(--sp-2);
      margin-top: var(--sp-1);
    }
    .tag-skeleton {
      display: inline-block;
      width: 68px;
      height: 22px;
      border-radius: var(--r-sm);
      background: linear-gradient(90deg, var(--ink-100) 25%, var(--ink-050) 50%, var(--ink-100) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Fund Detail Card ───────────────────────────────────────── */
    .fund-detail-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-top: 14px;
      overflow: hidden;
      animation: fadeInUp 0.3s ease forwards;
    }
    /* 顶部 risk badges + 数据时效 */
    .fund-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--ink-200);
      background: var(--ink-050);
    }
    .risk-badges {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-1);
      flex: 1;
      min-width: 0;
    }
    .risk-badge {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 8px;
      border-radius: var(--r-sm);
      background: var(--warn-soft);
      color: var(--warn);
      font-size: var(--fs-xs);
      line-height: 20px;
      white-space: nowrap;
      border: 1px solid rgba(180, 106, 0, 0.2);
      cursor: default;
    }
    .data-asof {
      font-size: var(--fs-xs);
      color: var(--ink-500);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      padding-top: 2px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .refreshing-dot { display: inline-flex; align-items: center; color: var(--ink-400); }
    .refreshing-dot svg.spin { animation: zojg-spin 0.9s linear infinite; }
    @keyframes zojg-spin { to { transform: rotate(360deg); } }
    .refresh-btn {
      background: none; border: none; padding: 0 2px; cursor: pointer;
      color: var(--ink-400); display: inline-flex; align-items: center;
      border-radius: 3px; transition: color .15s, background .15s;
    }
    .refresh-btn:hover { color: var(--brand-ink); background: var(--ink-50, rgba(0,0,0,0.04)); }
    .stale-hint {
      font-size: var(--fs-xs);
      color: var(--warn, #b46a00);
      background: var(--warn-soft, rgba(180, 106, 0, 0.08));
      padding: 4px 10px;
      border-radius: var(--r-sm, 4px);
      margin: 0 16px 8px;
      border: 1px solid rgba(180, 106, 0, 0.15);
    }
    .fund-detail-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .fund-detail-section:last-child { border-bottom: none; }
    .fund-detail-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }
    .nav-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .nav-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .nav-change {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .nav-change.up { color: #dc2626; }
    .nav-change.down { color: #16a34a; }
    .nav-date {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    .returns-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
    }
    .return-cell {
      text-align: center;
      padding: 6px 2px;
    }
    .return-cell .label {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .return-cell .value {
      font-size: 14px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .return-cell .value.up { color: var(--pos); }
    .return-cell .value.down { color: var(--neg); }
    .return-cell .value.flat { color: var(--ink-500); }
    /* 阶段表现表（收益 + 回撤 两行对齐） */
    .perf-table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      table-layout: fixed;
    }
    .perf-table th,
    .perf-table td {
      padding: 8px 4px;
      text-align: right;
      font-size: var(--fs-sm);
      line-height: 1.4;
    }
    .perf-table th {
      font-weight: 500;
      color: var(--ink-400);
      font-size: var(--fs-xs);
      border-bottom: 1px solid var(--ink-200);
      padding-bottom: 6px;
    }
    .perf-table .perf-row-label {
      text-align: left;
      color: var(--ink-500);
      font-size: var(--fs-xs);
      font-weight: 500;
      width: 52px;
      white-space: nowrap;
    }
    .perf-table tbody tr + tr td { border-top: 1px solid var(--ink-100); }
    .perf-table .perf-value {
      font-weight: 600;
      color: var(--ink-800);
    }
    .perf-table .perf-value.up { color: var(--pos); }
    .perf-table .perf-value.down { color: var(--neg); }
    .perf-table .perf-value.flat { color: var(--ink-400); }
    .perf-table .perf-dd {
      color: var(--warn);
      font-weight: 500;
    }
    .manager-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .manager-row + .manager-row { border-top: 1px solid #f3f4f6; }
    .manager-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .manager-info {
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: right;
    }
    .holdings-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .holding-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .holding-rank {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: #f3f4f6;
      color: var(--text-tertiary);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .holding-rank.top3 { background: var(--primary-light); color: var(--primary); }
    .holding-name { flex: 1; color: var(--text); }
    .holding-ratio {
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .holding-bar-bg {
      width: 50px;
      height: 6px;
      background: #f3f4f6;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .holding-bar {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      opacity: 0.6;
    }
    .fund-detail-loading {
      padding: 32px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }
    .fund-detail-loading .dot-pulse {
      display: inline-flex;
      gap: 4px;
    }
    .fund-detail-loading .dot-pulse span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      animation: dotPulse 1.2s infinite;
    }
    .fund-detail-loading .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .fund-detail-loading .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Pool Stats ──────────────────────────────────────────── */
    .pool-stats {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
    }
    .pool-stats-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .pool-stats-row:last-child { margin-bottom: 0; }
    .pool-stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
      white-space: nowrap;
      min-width: 32px;
    }
    .pool-bar-chart {
      display: flex;
      flex: 1;
      height: 20px;
      border-radius: 4px;
      overflow: hidden;
      background: #f3f4f6;
    }
    .pool-bar-seg {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      transition: width 0.4s ease;
    }
    .pool-bar-seg.stock { background: #3b82f6; }
    .pool-bar-seg.mixed { background: #8b5cf6; }
    .pool-bar-seg.bond { background: #10b981; }
    .pool-bar-seg.money { background: #f59e0b; }
    .pool-bar-seg.qdii { background: #ec4899; }
    .pool-bar-seg.other { background: #9ca3af; }
    .pool-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 6px;
    }
    .pool-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .pool-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .pool-total-scale {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
    }
    .pool-total-scale strong {
      color: var(--text);
      font-size: 14px;
    }

    /* ── Compare ───────────────────────────────────────────── */
    .compare-bar {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      box-shadow: 0 4px 16px rgba(0,85,212,0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      font-size: 14px;
      font-weight: 500;
      animation: fadeInUp 0.2s ease;
    }
    .compare-bar button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .compare-bar button:hover { background: rgba(255,255,255,0.3); }
    .compare-bar .clear-btn { background: none; padding: 6px 8px; opacity: 0.7; }
    .compare-bar .clear-btn:hover { opacity: 1; }
    .compare-modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .compare-modal {
      background: var(--card);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .compare-header {
      position: sticky;
      top: 0;
      background: var(--card);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1;
    }
    .compare-header h3 {
      font-size: 17px;
      font-weight: 600;
    }
    .compare-table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }
    .compare-table th {
      position: sticky;
      top: 52px;
      background: #f9fafb;
      padding: 10px 12px;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .compare-table th:first-child {
      text-align: left;
      color: var(--text-tertiary);
      width: 72px;
    }
    .compare-table td {
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid #f3f4f6;
      font-variant-numeric: tabular-nums;
    }
    .compare-table td:first-child {
      text-align: left;
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
    }
    .compare-table .best {
      color: #dc2626;
      font-weight: 700;
    }
    .compare-fund-name {
      font-size: 12px;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Type Filter Chips ───────────────────────────────────── */
    .filter-chips {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      margin-bottom: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .filter-chips::-webkit-scrollbar { display: none; }
    .filter-chip { flex-shrink: 0; }
    .filter-chip {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }
    .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
    .filter-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .compare-check {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      accent-color: var(--primary);
      vertical-align: middle;
      margin-right: 4px;
    }

    /* ── 3.2 Form Elements ─────────────────────────────────────── */
    .input-group {
      margin-bottom: 14px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input,
    .input-wrap select {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      font-family: inherit;
    }
    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 85, 212, 0.1);
    }
    .input-wrap input::placeholder {
      color: var(--text-tertiary);
    }
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .checkbox-wrap input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    /* ── 3.3 Dropdowns & Suggestions ───────────────────────────── */
    .dropdown {
      position: relative;
    }
    .dropdown-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      max-height: 240px;
      overflow-y: auto;
      z-index: 50;
      margin-top: 4px;
    }
    .dropdown-item {
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--border);
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:active,
    .dropdown-item:hover { background: var(--primary-light); }
    .dropdown-item .product-count {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: 8px;
    }
    .suggestions {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      margin-top: 4px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
    }
    .suggestion-item {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      transition: background var(--transition);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:active { background: var(--primary-light); }
    .suggestion-item .code {
      color: var(--primary);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* ── 3.4 Buttons ───────────────────────────────────────────── */
    /* ── 按钮三级体系 — primary / secondary / ghost ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 40px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: var(--r-md);
      font-size: var(--fs-body);
      font-weight: 500;
      cursor: pointer;
      transition: background-color var(--dur) var(--ease),
                  border-color var(--dur) var(--ease),
                  color var(--dur) var(--ease);
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.1px;
    }
    .btn:focus-visible {
      outline: 2px solid var(--brand-ink);
      outline-offset: 2px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Tier 1 — 实心强调 */
    .btn-primary {
      background: var(--brand-ink);
      color: #fff;
      border-color: var(--brand-ink);
    }
    .btn-primary:hover:not(:disabled),
    .btn-primary:active {
      background: var(--brand-ink-hover);
      border-color: var(--brand-ink-hover);
    }
    /* Tier 2 — 描边次级（兼容旧 .btn-outline） */
    .btn-secondary,
    .btn-outline {
      background: var(--paper);
      color: var(--brand-ink);
      border-color: var(--ink-300);
    }
    .btn-secondary:hover:not(:disabled),
    .btn-outline:hover:not(:disabled) {
      border-color: var(--brand-ink);
      background: var(--brand-tint);
    }
    /* Tier 3 — 幽灵无边 */
    .btn-ghost {
      background: transparent;
      color: var(--ink-600);
      border-color: transparent;
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--ink-100);
      color: var(--brand-ink);
    }
    /* 警示（保留红色语义） */
    .btn-danger {
      background: var(--paper);
      color: var(--pos);
      border-color: var(--pos);
    }
    .btn-danger:hover:not(:disabled),
    .btn-danger:active { background: var(--pos-soft); }
    .btn-sm {
      height: 32px;
      padding: 0 12px;
      font-size: var(--fs-sm);
    }
    .btn-block { width: 100%; }
    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      color: var(--text-tertiary);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: #f3f4f6; }
    .icon-btn.danger:active { background: var(--danger-bg); color: var(--danger); }

    /* ── 3.5 Modals ────────────────────────────────────────────── */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-content {
      background: var(--card);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .modal-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* ── 3.6 Tables ────────────────────────────────────────────── */
    .product-section {
      padding: 4px 20px 16px;
      border-top: 1px solid var(--border);
    }
    .product-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      margin-top: 8px;
      border-bottom: 1px solid var(--border);
    }
    .compare-all-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .product-count-label {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .product-list {
      margin-top: 4px;
    }
    .product-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .product-info {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .product-main {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .product-code {
      font-variant-numeric: tabular-nums;
      color: var(--primary);
      font-weight: 500;
      font-size: 13px;
      flex-shrink: 0;
    }
    .product-name {
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .product-type {
      font-size: 11px;
      color: var(--text-tertiary);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .add-product-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .add-product-row input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .add-product-row input:focus {
      border-color: var(--primary);
    }
    .product-search {
      margin-top: 12px;
    }
    .product-search input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .preview-section {
      margin-top: 16px;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .preview-header h3 {
      font-size: 15px;
      font-weight: 600;
    }
    .preview-count {
      font-size: 13px;
      color: var(--text-tertiary);
    }
    .preview-table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }
    .preview-table th {
      text-align: left;
      padding: 8px 6px;
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }
    .preview-table td {
      padding: 8px 6px;
      border-bottom: 1px solid #f3f4f6;
    }
    .preview-table td input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    .preview-table td input:focus { border-color: var(--primary); }
    .preview-table .warn {
      background: #fef3c7;
    }
    .preview-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .preview-table input.name-corrected {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── 3.7 Upload Zones ──────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: #fafbfc;
      margin-bottom: 16px;
    }
    .upload-zone:active,
    .upload-zone.dragover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .upload-zone input[type="file"] {
      display: none;
    }
    .upload-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .upload-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .upload-desc {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    /* ── 3.8 Toast & Progress ──────────────────────────────────── */
    .toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--paper);
      color: var(--ink-800);
      padding: 10px 18px 10px 22px;
      border: 1px solid var(--ink-200);
      border-left: 3px solid var(--brand-ink);
      border-radius: var(--r-md);
      box-shadow: var(--sh-2);
      font-size: var(--fs-body);
      z-index: 1000;
      opacity: 0;
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.toast-success { border-left-color: var(--ok); }
    .toast.toast-error { border-left-color: var(--pos); }
    .toast.toast-warn { border-left-color: var(--warn); }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
      margin: 12px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .vstatus {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
    }
    .vstatus-checking { color: var(--text-tertiary); font-size: 12px; letter-spacing: -2px; }
    .vstatus-ok  { background: var(--success); color: #fff; cursor: pointer; }
    .vstatus-err { background: var(--danger); color: #fff; }

    /* ═══════════════════════════════════════════════════════════════
       Section 4 · Utilities & Responsive
       ═══════════════════════════════════════════════════════════════ */

    /* ── 4.1 Utility Classes ───────────────────────────────────── */
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mb-12 { margin-bottom: 12px; }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .text-sm { font-size: 13px; }
    .text-muted { color: var(--text-tertiary); }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-tertiary);
    }
    .empty-state .empty-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      color: var(--ink-300);
    }
    .empty-state .empty-icon svg { width: 100%; height: 100%; display: block; }
    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── 4.2 Animations ────────────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeInUp 0.3s ease forwards;
    }

    /* ── 4.3 Scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    /* ── 4.4 Desktop / Responsive ──────────────────────────────── */
    @media (max-width: 400px) {
      .returns-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    @media (min-width: 640px) {
      .container { padding: 24px; }
      .header { padding: 20px 24px; }
      .header h1 { font-size: 18px; }
      .header-subtitle { font-size: 13px; }
    }

    /* ── 4.5 Login Page ────────────────────────────────────────── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at top, rgba(15, 42, 63, 0.04) 0%, transparent 60%),
        var(--ink-050);
      padding: 20px;
    }
    .login-card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-card .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
    }
    .login-card .logo svg { width: 100%; height: 100%; display: block; }
    .login-card h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-card .subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 28px;
    }
    .login-card .input-wrap {
      margin-bottom: 16px;
    }
    .login-card .input-wrap input {
      text-align: center;
      letter-spacing: 2px;
    }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 20px;
    }
    .login-card .btn { width: 100%; }
    /* ═══════════════════════════════════════════════════════════════
       M2 · Export menu + Print styles
       ═══════════════════════════════════════════════════════════════ */
    .export-menu-wrap {
      position: relative;
      display: inline-block;
    }
    .export-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 176px;
      background: var(--paper);
      border: 1px solid var(--ink-200);
      border-radius: var(--r-md);
      box-shadow: var(--sh-2);
      padding: 4px;
      z-index: 50;
      animation: fadeInUp 0.14s ease forwards;
    }
    .export-menu-item {
      display: block;
      width: 100%;
      padding: 8px 12px;
      background: none;
      border: none;
      text-align: left;
      font-size: var(--fs-sm);
      color: var(--ink-800);
      cursor: pointer;
      border-radius: var(--r-sm);
      font-family: inherit;
    }
    .export-menu-item:hover {
      background: var(--brand-tint);
      color: var(--brand-ink);
    }

    /* Print-only header (hidden on screen, shown when printing) */
    .print-header { display: none; }

    /* ═══════════════════════════════════════════════════════════════
       M4 · Accessibility
       ═══════════════════════════════════════════════════════════════ */
    input:focus-visible,
    button:focus-visible,
    a:focus-visible,
    [tabindex]:focus-visible {
      outline: 2px solid var(--brand-ink);
      outline-offset: 2px;
      border-radius: var(--r-sm);
    }
    /* 鼠标点击时不显示焦点环，仅键盘导航显示 */
    button:focus:not(:focus-visible) { outline: none; }

    /* ═══════════════════════════════════════════════════════════════
       M3 · Manager tab / chip bar / comparison
       ═══════════════════════════════════════════════════════════════ */

    /* Chip bar (F2.1) */
    .chip-bar {
      display: flex;
      gap: var(--sp-1);
      margin-top: var(--sp-2);
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
      -ms-overflow-style: none;
    }
    .chip-bar::-webkit-scrollbar { height: 3px; }
    .chip-bar::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 2px; }
    .chip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 10px;
      background: var(--paper);
      border: 1px solid var(--ink-200);
      color: var(--ink-600);
      border-radius: 13px;
      font-size: var(--fs-xs);
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background var(--dur) var(--ease), color var(--dur) var(--ease), border-color var(--dur) var(--ease);
    }
    .chip:hover { border-color: var(--brand-ink); color: var(--brand-ink); }
    .chip.active {
      background: var(--brand-ink);
      border-color: var(--brand-ink);
      color: #fff;
    }
    .chip-count {
      font-size: 10px;
      opacity: 0.7;
      font-variant-numeric: tabular-nums;
    }

    /* Manager list */
    .manager-list-card { padding: 0; }
    .manager-row-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--ink-100);
      cursor: pointer;
      transition: background var(--dur) var(--ease);
    }
    .manager-row-item:last-child { border-bottom: none; }
    .manager-row-item:hover { background: var(--brand-tint); }
    .manager-row-main { min-width: 0; flex: 1; }
    .manager-row-name {
      font-size: var(--fs-h2);
      font-weight: 600;
      color: var(--ink-900);
      margin-bottom: 2px;
    }
    .manager-row-meta {
      font-size: var(--fs-xs);
      color: var(--ink-500);
    }

    /* Manager detail */
    .manager-detail-header {
      padding: var(--sp-4);
      border-bottom: 1px solid var(--ink-200);
    }
    .manager-detail-name {
      font-size: var(--fs-display);
      line-height: var(--lh-display);
      font-weight: 600;
      color: var(--ink-900);
      letter-spacing: -0.2px;
    }
    .manager-detail-sub {
      font-size: var(--fs-sm);
      color: var(--ink-500);
      margin-top: 4px;
    }
    .manager-funds-table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--fs-sm);
    }
    .manager-funds-table th,
    .manager-funds-table td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--ink-100);
    }
    .manager-funds-table th {
      background: var(--ink-050);
      font-weight: 600;
      color: var(--ink-600);
      font-size: var(--fs-xs);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .manager-funds-table tbody tr:hover { background: var(--ink-050); }
    .manager-funds-table .num-col { text-align: right; }
    .type-pill {
      display: inline-block;
      padding: 1px 6px;
      background: var(--ink-100);
      color: var(--ink-600);
      border-radius: var(--r-sm);
      font-size: var(--fs-xs);
    }

    /* Manager link in fund-detail */
    .manager-name.manager-link {
      color: var(--brand-ink);
      cursor: pointer;
      text-decoration: underline dotted;
      text-underline-offset: 2px;
    }
    .manager-name.manager-link:hover { color: var(--brand-ink-hover); }

    /* Comparison view */
    .compare-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-3);
      padding: var(--sp-3);
      background: var(--brand-tint);
      border: 1px solid var(--ink-200);
      border-radius: var(--r-md);
      margin-bottom: var(--sp-3);
    }
    .compare-toolbar-info {
      font-size: var(--fs-sm);
      color: var(--ink-700, var(--ink-800));
    }
    .inst-card.compare-selectable .inst-header { cursor: pointer; }
    .inst-card.compare-selectable .inst-actions { display: none; }
    .inst-card.compare-selectable {
      border-color: var(--ink-200);
    }
    .inst-card.compare-selected {
      border-color: var(--brand-ink) !important;
      box-shadow: 0 0 0 1px var(--brand-ink), var(--sh-1);
    }
    .compare-result {
      margin-bottom: var(--sp-3);
      padding: 0;
    }
    .compare-section {
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--ink-100);
    }
    .compare-section:last-child { border-bottom: none; }
    .compare-heading {
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--ink-800);
      margin-bottom: var(--sp-2);
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }
    .compare-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 18px;
      padding: 0 6px;
      background: var(--brand-ink);
      color: #fff;
      border-radius: 9px;
      font-size: var(--fs-xs);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .compare-empty {
      font-size: var(--fs-sm);
      color: var(--ink-400);
      padding: var(--sp-2) 0;
    }
    .compare-fund-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .compare-fund-item {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: 6px 8px;
      font-size: var(--fs-sm);
      color: var(--ink-800);
      border-radius: var(--r-sm);
    }
    .compare-fund-item:hover { background: var(--ink-050); }
    .compare-fund-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .heat-rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: var(--ink-100);
      color: var(--ink-600);
      border-radius: var(--r-sm);
      font-size: var(--fs-xs);
      font-weight: 600;
      flex-shrink: 0;
    }
    .heat-coverage {
      font-size: var(--fs-xs);
      color: var(--ink-500);
      white-space: nowrap;
    }

    /* ── @media print ──────────────────────────────────────────────
       Chrome/Edge 友好；仅打印当前 inst-card
       ───────────────────────────────────────────────────────────── */
    @media print {
      @page { margin: 1.4cm 1cm; }
      body {
        background: #fff !important;
        color: #000 !important;
      }
      /* 隐藏所有导航、按钮、toast、合规条、登录页面等 */
      .header,
      .bottom-nav,
      .compliance-bar,
      .toast,
      .inst-actions,
      .inst-card .pool-stats,
      .toolbar,
      .empty-state,
      .fund-detail-card,
      .result-card,
      .suggestions,
      .input-group,
      .container > *:not(.inst-card) {
        display: none !important;
      }
      /* 只显示正在打印的 inst-card */
      .inst-card:not(.print-target) { display: none !important; }
      .inst-card.print-target {
        box-shadow: none !important;
        border: none !important;
        margin: 0 !important;
        padding: 0 !important;
        break-inside: avoid;
      }
      .inst-card.print-target .inst-header {
        border-bottom: 1px solid #999;
        cursor: default;
      }
      .inst-card.print-target .print-header {
        display: block !important;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 2px solid #000;
      }
      .print-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .print-meta {
        font-size: 11px;
        color: #555;
      }
      /* 表格样式 — 打印时让产品列表更紧凑 */
      .product-table,
      .product-table th,
      .product-table td {
        font-size: 11px !important;
      }
      #app { padding-bottom: 0 !important; }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Toast -->
  <div class="toast" :class="{show: toast.visible}">{{ toast.message }}</div>

  <!-- ═══════════════════════════════════════════════════════════
       Login Gate — unauthenticated users see ONLY this
       ═══════════════════════════════════════════════════════════ -->
  <div v-if="!authenticated" class="login-page">
    <div class="login-card">
      <div class="logo" v-html="ICONS.brandMark"></div>
      <h2>中欧基金</h2>
      <div class="subtitle">机构销售工作台</div>
      <div class="input-wrap">
        <input
          type="password"
          v-model="loginPassword"
          placeholder="请输入访问密码"
          @keyup.enter="handleLogin"
          ref="loginInput"
          autocomplete="current-password"
        >
      </div>
      <div class="login-error">{{ loginError }}</div>
      <button class="btn btn-primary" @click="handleLogin" :disabled="loginLoading">
        {{ loginLoading ? '验证中...' : '进入系统' }}
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       Main Application — only rendered when authenticated
       ═══════════════════════════════════════════════════════════ -->
  <template v-if="authenticated">

    <!-- Header with user info & logout -->
    <div class="header">
      <div class="header-title">
        <h1><span>中欧基金</span></h1>
        <div class="header-subtitle">产品池查询</div>
      </div>
      <div class="header-right">
        <div class="avatar">Z</div>
        <button class="logout-btn" @click="handleLogout">退出</button>
      </div>
    </div>

    <!-- Query View -->
    <div class="container" v-if="currentView === 'query'">
      <!-- Institution Selector -->
      <div class="input-group">
        <label>选择机构客户</label>
        <div class="dropdown">
          <div class="input-wrap">
            <input
              type="text"
              v-model="instSearchText"
              @focus="showInstDropdown = true"
              @input="showInstDropdown = true"
              placeholder="搜索或选择机构..."
            >
          </div>
          <div class="dropdown-list" v-if="showInstDropdown && filteredInstitutions.length > 0" @mousedown.prevent>
            <div
              class="dropdown-item"
              v-for="inst in filteredInstitutions"
              :key="inst.id"
              @click="selectInstitution(inst)"
            >
              {{ inst.name }}
              <span class="product-count">{{ inst.products.length }}只产品</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty state guide -->
      <div class="empty-state" v-if="!selectedInstitution && institutions.length > 0">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-tertiary)">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </div>
        <p>请先选择机构客户<br>然后输入基金代码或名称查询</p>
      </div>

      <!-- Fund Query -->
      <div class="input-group" v-if="selectedInstitution">
        <label>查询基金产品</label>
        <div class="input-wrap">
          <input
            type="text"
            v-model="fundQuery"
            @input="onFundQueryInput"
            placeholder="输入基金代码 / 名称 / 基金经理..."
            ref="fundInput"
          >
        </div>
        <!-- Quick filter chips (M3-F2.1) -->
        <div class="chip-bar" v-if="quickFilterChips.length > 1">
          <button
            v-for="c in quickFilterChips"
            :key="c.key"
            class="chip"
            :class="{ active: quickFilter === c.key }"
            @click="quickFilter = c.key; onFundQueryInput()"
          >{{ c.label }} <span class="chip-count">{{ c.count }}</span></button>
        </div>
        <!-- Suggestions -->
        <div class="suggestions" v-if="(fundQuery || quickFilter !== 'all') && fundSuggestions.length > 0 && !queryResult">
          <div
            class="suggestion-item"
            v-for="p in fundSuggestions"
            :key="p.code"
            @click="selectFund(p)"
          >
            <span>{{ p.name }}</span>
            <span class="code">{{ p.code }}</span>
          </div>
        </div>
      </div>

      <!-- Result -->
      <div
        v-if="queryResult"
        class="result-card"
        :class="[queryResult, { visible: resultVisible }]"
      >
        <div class="result-chip">
          <div class="result-icon" v-html="queryResult === 'investable' ? ICONS.checkCircle : ICONS.xCircle"></div>
          <span>{{ queryResult === 'investable' ? '可投资' : '不可投资' }}</span>
        </div>
        <div class="result-detail" v-if="queryResult === 'investable' && matchedFund">
          <span class="fund-code">{{ matchedFund.code }}</span>{{ matchedFund.name }}
        </div>
        <div class="result-text na-hint" v-if="queryResult === 'not-investable'">
          {{ selectedInstitution.name }} 的产品池中未找到该产品
        </div>
        <div class="fund-tags-loading" v-if="queryResult === 'investable' && fundTagsLoading">
          <span class="tag-skeleton"></span>
          <span class="tag-skeleton"></span>
          <span class="tag-skeleton"></span>
        </div>
        <div class="fund-tags" v-if="queryResult === 'investable' && fundTags.length > 0">
          <span
            class="fund-tag"
            v-for="(tag, i) in fundTags"
            :key="i"
            :class="'tag-' + tag.color"
          >{{ tag.label }}</span>
        </div>
      </div>

      <!-- Fund Detail Card -->
      <div class="fund-detail-card" v-if="queryResult === 'investable' && fundDetail">
        <!-- Risk Badges + data-as-of -->
        <div class="fund-detail-header">
          <div class="risk-badges" v-if="riskBadges.length > 0">
            <span
              class="risk-badge"
              v-for="b in riskBadges"
              :key="b.label"
              :title="b.tip"
            >{{ b.label }}</span>
          </div>
          <div class="data-asof" v-if="fundDetail.navDate">
            数据截至 {{ fundDetail.navDate }}
            <span v-if="fundDetailRefreshing" class="refreshing-dot" title="正在获取最新数据">
              <svg class="spin" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
              </svg>
            </span>
            <button v-else class="refresh-btn" @click="refreshCurrentFund" title="手动刷新">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
              </svg>
            </button>
          </div>
        </div>
        <div v-if="fundDetailStale" class="stale-hint">
          当前显示缓存数据，正在更新至最新交易日…
        </div>
        <!-- NAV Section -->
        <div class="fund-detail-section">
          <div class="fund-detail-title">最新净值</div>
          <div class="nav-row">
            <span class="nav-value">{{ fundDetail.latestNav ? fundDetail.latestNav.toFixed(4) : '--' }}</span>
            <span
              class="nav-change"
              :class="fundDetail.dailyChange >= 0 ? 'up' : 'down'"
              v-if="fundDetail.dailyChange != null"
            >{{ fundDetail.dailyChange >= 0 ? '+' : '' }}{{ fundDetail.dailyChange.toFixed(2) }}%</span>
          </div>
          <div class="nav-date" v-if="fundDetail.navDate">{{ fundDetail.navDate }}</div>
        </div>

        <!-- Returns + Max Drawdown Section -->
        <div class="fund-detail-section" v-if="fundDetail.returns">
          <div class="fund-detail-title">阶段表现</div>
          <table class="perf-table">
            <thead>
              <tr>
                <th class="perf-row-label"></th>
                <th v-for="p in [
                  { key: '1m', label: '近1月' },
                  { key: '3m', label: '近3月' },
                  { key: '6m', label: '近6月' },
                  { key: '1y', label: '近1年' },
                  { key: 'all', label: '成立来' }
                ]" :key="p.key">{{ p.label }}</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="perf-row-label">收益</td>
                <td
                  v-for="p in ['1m','3m','6m','1y','all']"
                  :key="'r-'+p"
                  class="perf-value num"
                  :class="returnClass(fundDetail.returns[p])"
                >{{ formatReturn(fundDetail.returns[p]) }}</td>
              </tr>
              <tr v-if="fundDetail.drawdowns">
                <td class="perf-row-label">最大回撤</td>
                <td
                  v-for="p in ['1m','3m','6m','1y','all']"
                  :key="'d-'+p"
                  class="perf-value perf-dd num"
                  :title="'区间内最大回撤'"
                >{{ formatDrawdown(fundDetail.drawdowns[p]) }}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Manager Section -->
        <div class="fund-detail-section" v-if="fundDetail.managerDetails && fundDetail.managerDetails.length > 0">
          <div class="fund-detail-title">基金经理</div>
          <div class="manager-row" v-for="m in fundDetail.managerDetails" :key="m.name">
            <span class="manager-name manager-link" @click="openManager(m.name)" :title="'查看 ' + m.name + ' 的全部在池基金'">{{ m.name }}</span>
            <span class="manager-info">
              <template v-if="m.workTime">任职{{ m.workTime }}</template>
              <template v-if="m.fundSize"><br>管理规模 {{ m.fundSize }}</template>
            </span>
          </div>
        </div>

        <!-- Top Holdings Section -->
        <div class="fund-detail-section" v-if="fundDetail.topHoldings && fundDetail.topHoldings.length > 0">
          <div class="fund-detail-title">前十大持仓</div>
          <div class="holdings-list">
            <div class="holding-item" v-for="(h, i) in fundDetail.topHoldings" :key="i">
              <span class="holding-rank" :class="{ top3: i < 3 }">{{ i + 1 }}</span>
              <span class="holding-name">{{ h.name }}</span>
              <span class="holding-ratio">{{ h.ratio.toFixed(2) }}%</span>
              <span class="holding-bar-bg">
                <span class="holding-bar" :style="{ width: (h.ratio / maxHoldingRatio * 100) + '%' }"></span>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="fund-detail-card" v-if="queryResult === 'investable' && fundTagsLoading">
        <div class="fund-detail-loading">
          <div class="dot-pulse"><span></span><span></span><span></span></div>
          <div style="margin-top:8px;">加载基金详情...</div>
        </div>
      </div>

      <!-- Empty state -->
      <div class="empty-state" v-if="institutions.length === 0">
        <div class="empty-icon" v-html="ICONS.clipboard"></div>

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function getSession() {

    const session = JSON.parse(raw);
    if (Date.now() - session.ts > SESSION_TTL_MS) {
      localStorage.removeItem(LS_SESSION);
      return null;
    }
    return session;
  } catch { return null; }
}

function createSession() {
  const session = { ts: Date.now(), token: crypto.randomUUID() };
  localStorage.setItem(LS_SESSION, JSON.stringify(session));
  return session;
}

function destroySession() {
  localStorage.removeItem(LS_SESSION);
}

async function signRequest(action) {
  const ts = Math.floor(Date.now() / 30000); // 30-second window
  return await sha256(SIGN_SECRET + ':' + ts + ':' + action);
}

function fuzzyMatch(query, target) {
  if (!query) return { match: true, score: 0 };
  query = query.toLowerCase().trim();
  target = target.toLowerCase();
  if (target === query) return { match: true, score: 100 };
  if (target.startsWith(query)) return { match: true, score: 80 };
  if (target.includes(query)) return { match: true, score: 60 };
  if (/^\d+$/.test(query) && target.startsWith(query)) return { match: true, score: 70 };
  let qi = 0;
  for (let ti = 0; ti < target.length && qi < query.length; ti++) {
    if (target[ti] === query[qi]) qi++;
  }
  if (qi === query.length) return { match: true, score: 40 };
  return { match: false, score: 0 };
}

    window[cbName] = (data) => {

}

function resolveFundClassification(rawType, name) {
  const t = (rawType || '').trim();
  const nm = (name || '').trim();
  const secondary = t;
  let primary = '其他';
  if (/QDII|海外|全球|美国|港股通/i.test(t + nm)) {
    primary = 'QDII';
  } else if (/货币/.test(t) || (!t && /货币|现金/.test(nm))) {
    primary = '货币';
  } else if (/^指数型\s*[-－]/.test(t)) {
    const sub = t.replace(/^指数型\s*[-－]\s*/, '');
    if (/固收|债/.test(sub)) primary = '债券';
    else if (/股票/.test(sub)) primary = '股票';
    else if (/商品/.test(sub)) primary = '其他';
    else primary = '股票';
  } else if (/债券型|纯债|可转债|混合债券|短期纯债|中长期纯债/.test(t)) {
    primary = '债券';
  } else if (/混合型|偏股混合|偏债混合|灵活配置|平衡混合/.test(t)) {
    primary = '混合';
  } else if (/股票型|被动指数|增强指数|行业主题/.test(t)) {
    primary = '股票';
  } else if (!t) {
    if (/债|纯债|信用|利率/.test(nm)) primary = '债券';
    else if (/指数|ETF|LOF|增强/i.test(nm)) primary = '股票';
    else if (/混合|灵活|平衡|配置/.test(nm)) primary = '混合';
    else if (/股|成长|价值|精选|优选/.test(nm)) primary = '股票';
  }
  return { primary, secondary };
}

// ── PromiseQueue: 限流并发池（替代原 _fundMetaSeq 单链串行） ─────────────
class PromiseQueue {
  constructor(concurrency = 4) {
    this.concurrency = concurrency;
    this.running = 0;
    this.high = [];
    this.low = [];
  }
  add(factory, opts) {
    opts = opts || {};
    return new Promise((resolve, reject) => {
      const item = { factory, resolve, reject };
      if (opts.priority === 'high') this.high.push(item);
      else this.low.push(item);
      this._tick();
    });
  }
  _tick() {
    while (this.running < this.concurrency && (this.high.length || this.low.length)) {
      const item = this.high.length ? this.high.shift() : this.low.shift();
      this.running++;
      Promise.resolve().then(item.factory).then(
        v => { this.running--; item.resolve(v); this._tick(); },
        e => { this.running--; item.reject(e); this._tick(); }
      );
    }
  }
}

  } catch { return {}; }
}
function saveMetaCache(items) {
  try {
    // LRU 淘汰：超过容量时按 fetchedAt 排序删最旧
    const keys = Object.keys(items);
    if (keys.length > META_CACHE_MAX) {
      const sorted = keys.sort((a, b) => (items[a].fetchedAt || 0) - (items[b].fetchedAt || 0));
      const drop = sorted.slice(0, keys.length - META_CACHE_MAX + 50);
      drop.forEach(k => delete items[k]);
    }
    localStorage.setItem(META_CACHE_KEY, JSON.stringify({ v: META_SCHEMA_VERSION, items }));
  } catch {}
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
// 最近一个预期已发布的交易日：
//   - 周一~周五 收盘后(>=20:00) → 今日
//   - 周一~周五 收盘前           → 上个交易日（周一则上推到上周五）
//   - 周六/周日                   → 上周五
function latestExpectedNavDate() {
  const d = new Date();
  const dow = d.getDay(); // 0=Sun … 6=Sat
  const hour = d.getHours();
  const walk = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if (dow === 0) walk.setDate(walk.getDate() - 2);          // 周日 → 周五
  else if (dow === 6) walk.setDate(walk.getDate() - 1);     // 周六 → 周五
  else if (hour < TRADING_DAY_CLOSE_HOUR) {
    if (dow === 1) walk.setDate(walk.getDate() - 3);        // 周一收盘前 → 上周五
    else walk.setDate(walk.getDate() - 1);                  // 其他工作日收盘前 → 昨日
  }
  // 其余情况（工作日收盘后）→ 今日
  return `${walk.getFullYear()}-${String(walk.getMonth()+1).padStart(2,'0')}-${String(walk.getDate()).padStart(2,'0')}`;
}
function isClosedEndFund(meta) {
  const name = (meta && meta.name) || '';
  // 只识别真正的定开/持有期/封闭运作产品；避免把 "0-3年" 等久期描述误判
  return /定开|持有期|封闭运作|封闭期|\d+\s*个月持有|\d+\s*年持有/.test(name);
}
function daysBetween(dateStr) {
  if (!dateStr) return Infinity;
  const ms = new Date(dateStr + 'T00:00:00').getTime();
  if (isNaN(ms)) return Infinity;
  return (Date.now() - ms) / 86400000;
}
function isFreshMeta(entry) {
  if (!entry || !entry.navDate) return false;
  // 封闭期/定开产品：净值按周/月发布，放宽到 14 天
  if (isClosedEndFund(entry.meta)) {
    return daysBetween(entry.navDate) <= 14;
  }
  // 普通开放式：navDate 不早于"最近一个预期已发布交易日"
  return entry.navDate >= latestExpectedNavDate();
}
function cacheMeta(bare, meta) {
  const items = loadMetaCache();
  items[bare] = { meta, fetchedAt: Date.now(), navDate: meta && meta.navDate };
  saveMetaCache(items);
}
function readCachedMeta(bare) {
  const items = loadMetaCache();
  return items[bare] || null;
}

function fetchFundMeta(bare, opts) {
  opts = opts || {};
  // 命中持久化缓存（新鲜）→ 直接返回，不发请求
  if (!opts.force) {
    const cached = readCachedMeta(bare);
    if (cached && cached.meta && isFreshMeta(cached)) {
      return Promise.resolve(cached.meta);
    }
  }
  const curr = _fundMetaQueue.add(() => new Promise((resolve, reject) => {
    let settled = false;
    const timer = setTimeout(() => { if(!settled){ settled=true; cleanup(); reject(new Error('timeout')); } }, 8000);
    const script = document.createElement('script');
    script.src = 'https://fund.eastmoney.com/pingzhongdata/' + bare + '.js?v=' + Date.now();
    script.onload = () => {
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      // Derive fund type from asset allocation (二级分类初值，稍后 fetchFundType 可覆盖)
      let fundType = null;
      const aa = window.Data_assetAllocation;
      if (window.ishb) {
        fundType = '货币型';
      } else if (aa && aa.series) {
        const stock = aa.series.find(s => s.name === '股票占净比');
        const bond = aa.series.find(s => s.name === '债券占净比');
        const latestStock = stock && stock.data.length > 0 ? stock.data[stock.data.length - 1] : 0;
        const latestBond = bond && bond.data.length > 0 ? bond.data[bond.data.length - 1] : 0;
        if (latestStock >= 80) fundType = '股票型';
        else if (latestStock >= 60) fundType = '混合型-偏股';
        else if (latestBond >= 80) fundType = '债券型';
        else if (latestBond >= 60) fundType = '混合型-偏债';
        else if (latestStock > 0 || latestBond > 0) fundType = '混合型-平衡';
        else fundType = '其他';
      }
      // 统一口径：通过权威表规范化（同时得出一级分类，下游可直接用）
      const _cls = resolveFundClassification(fundType, window.fS_name);
      // Derive scale from Data_fluctuationScale
      let scaleValue = null;
      const fs = window.Data_fluctuationScale;
      if (fs && fs.series && fs.series.length > 0) {
        scaleValue = fs.series[fs.series.length - 1].y;
      }
      // Derive inception date from first NAV data point
      let inceptionDate = null;
      const nwt = window.Data_netWorthTrend;
      if (nwt && nwt.length > 0) {
        inceptionDate = new Date(nwt[0].x).toISOString().slice(0, 10);
      }
      // Top holdings placeholder (loaded separately via fetchFundHoldings)
      let topHoldings = [];
      // Extract latest NAV and daily change
      let latestNav = null, navDate = null, dailyChange = null;
      const nwtArr = window.Data_netWorthTrend;
      if (nwtArr && nwtArr.length > 0) {
        const last = nwtArr[nwtArr.length - 1];
        latestNav = last.y;
        navDate = new Date(last.x).toISOString().slice(0, 10);
        if (last.equityReturn != null) dailyChange = last.equityReturn;
      }
      // Extract multi-period returns + max drawdown
      const returns = {};
      const drawdowns = {}; // 区间内最大回撤，负数百分比字符串
      if (nwtArr && nwtArr.length > 1) {
        const lastNav = nwtArr[nwtArr.length - 1].y;
        const lastTs = nwtArr[nwtArr.length - 1].x;
        const periods = { '1m': 30, '3m': 90, '6m': 180, '1y': 365, 'all': Infinity };
        // 辅助：在 [startIdx, endIdx] 区间内计算最大回撤（以净值序列为基础）
        const computeMaxDD = (startIdx, endIdx) => {
          let peak = -Infinity;
          let maxDD = 0;
          for (let i = startIdx; i <= endIdx; i++) {
            const v = nwtArr[i] && nwtArr[i].y;
            if (v == null || isNaN(v)) continue;
            if (v > peak) peak = v;
            if (peak > 0) {
              const dd = (v - peak) / peak;
              if (dd < maxDD) maxDD = dd;
            }
          }
          return maxDD; // 负数（或 0）
        };
        for (const [key, days] of Object.entries(periods)) {
          let startIdx = 0;
          if (days === Infinity) {
            const firstNav = nwtArr[0].y;
            if (firstNav > 0) returns[key] = ((lastNav - firstNav) / firstNav * 100).toFixed(2);
          } else {
            const target = lastTs - days * 24 * 3600 * 1000;
            let closestI = 0;
            for (let i = 0; i < nwtArr.length; i++) {
              if (Math.abs(nwtArr[i].x - target) < Math.abs(nwtArr[closestI].x - target)) closestI = i;
            }
            startIdx = closestI;
            const closest = nwtArr[closestI];
            if (closest.y > 0) returns[key] = ((lastNav - closest.y) / closest.y * 100).toFixed(2);
          }
          const dd = computeMaxDD(startIdx, nwtArr.length - 1);
          drawdowns[key] = (dd * 100).toFixed(2); // 例如 "-12.34"
        }
      }
      returns['1y_raw'] = window.syl_1n;
      // Extract manager details
      let managerDetails = [];
      const mgrs = window.Data_currentFundManager;
      if (mgrs && mgrs.length > 0) {
        managerDetails = mgrs.map(m => ({
          name: m.name || '',
          workTime: m.workTime || '',
          fundSize: m.fundSize || '',
        }));
      }
      const meta = {
        name: window.fS_name,
        type: fundType,
        primary: _cls.primary,
        scale: scaleValue,
        managers: window.Data_currentFundManager,
        return1y: window.syl_1n,
        inceptionDate: inceptionDate,
        latestNav, navDate, dailyChange,
        returns, drawdowns, topHoldings, managerDetails,
      };
      _fundMetaGlobals.forEach(k => { try { delete window[k]; } catch(e) {} });
      cleanup();
      try { cacheMeta(bare, meta); } catch(e) {}
      resolve(meta);
    };
    script.onerror = () => { if(!settled){ settled=true; clearTimeout(timer); cleanup(); reject(new Error('load failed')); } };
    function cleanup() { if (script.parentNode) script.parentNode.removeChild(script); }
    document.head.appendChild(script);
  }), { priority: opts.priority === 'low' ? 'low' : 'high' });
  return curr;
}

function extractManagerNames(meta) {
  if (meta && meta.managerDetails && meta.managerDetails.length > 0) {
    return meta.managerDetails.map(m => m.name).filter(Boolean).join('、');
  }
  return null;
}

// ── Generate fund characteristic tags ─────────────────────────────────────
function generateFundTags(meta) {
  const tags = [];
  // 1. Fund type (二级分类；无二级则回退到一级分类)
  const typeText = meta.type || meta.primary
    || (resolveFundClassification('', meta.name).primary);
  if (typeText && typeText !== '其他') {
    let typeLabel = typeText;
    if (meta.name && meta.name.includes('ETF联接')) typeLabel += ' ETF联接';
    else if (meta.name && /LOF/i.test(meta.name)) typeLabel += ' LOF';
    tags.push({ label: typeLabel, color: 'blue' });
  } else if (typeText) {
    tags.push({ label: typeText, color: 'blue' });
  }
  // 2. Fund scale
  if (meta.scale != null) {
    const size = parseFloat(meta.scale);
    if (!isNaN(size)) {
      const sizeLabel = size >= 1 ? size.toFixed(2) + '亿'
        : (size * 10000).toFixed(0) + '万';
      const color = size >= 100 ? 'gold' : size >= 50 ? 'amber' : size < 2 ? 'orange' : 'gray';
      tags.push({ label: '规模 ' + sizeLabel, color });
    }
  }
  // 3. Fund manager
  if (meta.managers && meta.managers.length > 0) {
    const first = meta.managers[0].name || '';
    const label = meta.managers.length > 1
      ? first + ' 等' + meta.managers.length + '人'
      : first;
    if (label) tags.push({ label: label, color: 'gray' });
  }
  // 4. 1-year performance (A股惯例: 正红负绿)
  if (meta.return1y != null && meta.return1y !== '') {
    const val = parseFloat(meta.return1y);
    if (!isNaN(val)) {
      const sign = val >= 0 ? '+' : '';
      tags.push({
        label: '近1年 ' + sign + val.toFixed(2) + '%',
        color: val >= 0 ? 'red' : 'green'
      });
    }
  }
  // 5. Fund age
  if (meta.inceptionDate) {
    const inception = new Date(meta.inceptionDate);
    if (!isNaN(inception.getTime())) {
      const years = (Date.now() - inception.getTime()) / (365.25 * 24 * 3600 * 1000);
      if (years < 1) tags.push({ label: '新基金 <1年', color: 'orange' });
      else if (years >= 10) tags.push({ label: '成立' + Math.floor(years) + '年', color: 'green' });
      else if (years >= 5) tags.push({ label: '成立' + Math.floor(years) + '年', color: 'green' });
    }
  }
  return tags.slice(0, 5);
}

    // ── M3-F1 Manager Index ─────────────────────────────────────
