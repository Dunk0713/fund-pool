// ── Generate fund characteristic tags ─────────────────────────────────────
function generateFundTags(meta) {
  const tags = [];
  // 1. Fund type (二级分类)
  if (meta.type) {
    let typeLabel = meta.type;
    if (meta.name && meta.name.includes('ETF联接')) typeLabel += ' ETF联接';
    else if (meta.name && /LOF/i.test(meta.name)) typeLabel += ' LOF';
    tags.push({ label: typeLabel, color: 'blue' });
  }
  // 2. Fund scale
  if (meta.scale != null) {
    const size = parseFloat(meta.scale);
    if (!isNaN(size)) {
      const sizeLabel = size >= 1 ? size.toFixed(2) + '亿'
        : (size * 10000).toFixed(0) + '万';
      const color = size >= 100 ? 'gold' : size >= 50 ? 'amber' : size < 2 ? 'orange' : 'gray';
      tags.push({ label: '规模 ' + sizeLabel, color });
    }
  }
  // 3. Fund manager
  if (meta.managers && meta.managers.length > 0) {
    const first = meta.managers[0].name || '';
    const label = meta.managers.length > 1
      ? first + ' 等' + meta.managers.length + '人'
      : first;
    if (label) tags.push({ label: label, color: 'gray' });
  }
  // 4. 1-year performance (A股惯例: 正红负绿)
  if (meta.return1y != null && meta.return1y !== '') {
    const val = parseFloat(meta.return1y);
    if (!isNaN(val)) {
      const sign = val >= 0 ? '+' : '';
      tags.push({
        label: '近1年 ' + sign + val.toFixed(2) + '%',
        color: val >= 0 ? 'red' : 'green'
      });
    }
  }
  // 5. Fund age
  if (meta.inceptionDate) {
    const inception = new Date(meta.inceptionDate);
    if (!isNaN(inception.getTime())) {
      const years = (Date.now() - inception.getTime()) / (365.25 * 24 * 3600 * 1000);
      if (years < 1) tags.push({ label: '新基金 <1年', color: 'orange' });
      else if (years >= 10) tags.push({ label: '成立' + Math.floor(years) + '年', color: 'green' });
      else if (years >= 5) tags.push({ label: '成立' + Math.floor(years) + '年', color: 'green' });
    }
  }
  return tags.slice(0, 5);
}

/* ═══════════════════════════════════════════════════════════════════
   Section 5 · Vue Application
   ═══════════════════════════════════════════════════════════════════ */

createApp({
  data() {
    return {
      // Icon set (exposed for templates via v-html)
      ICONS,

      // Auth
      authenticated: !!getSession(),
      loginPassword: '',
      loginError: '',
      loginLoading: false,

      currentView: 'query',
      institutions: [],

      // Query
      instSearchText: '',
      showInstDropdown: false,
      selectedInstitution: null,
      fundQuery: '',
      fundSuggestions: [],
      queryResult: null,
      resultVisible: false,
      matchedFund: null,
      fundTags: [],
      fundTagsLoading: false,

      // Manage
      expandedInst: null,
      productSearchText: '',
      showAddInstModal: false,
      newInstName: '',
      newProductCode: '',
      newProductName: '',
      deleteTarget: null,

      // Import
      importInstSearch: '',
      showImportInstDropdown: false,
      importTargetInst: null,
      excelDragover: false,
      isProcessing: false,
      ocrProgress: 0,
      ocrStatus: '',
      previewProducts: [],

      // Fund detail
      fundDetail: null,

      // Manage - backfill
      backfillLoading: false,
      backfillManagerLoading: false,
      backfillManagerProgress: '',

      // Manage - pool stats
      poolStatsInst: null,
      poolStats: null,

      // Manage - type filter
      productTypeFilter: '',

      // Compare
      compareList: [],
      compareSet: new Set(),
      showCompareModal: false,
      compareLoading: false,
      compareData: [],

      // Toast
      toast: { message: '', visible: false, timer: null }
    };
  },

  computed: {
    filteredInstitutions() {
      if (!this.instSearchText.trim()) return this.institutions;
      return this.institutions.filter(inst =>
        fuzzyMatch(this.instSearchText, inst.name).match
      ).sort((a, b) =>
        fuzzyMatch(this.instSearchText, b.name).score - fuzzyMatch(this.instSearchText, a.name).score
      );
    },
    importFilteredInsts() {
      if (!this.importInstSearch.trim()) return this.institutions;
      return this.institutions.filter(inst =>
        fuzzyMatch(this.importInstSearch, inst.name).match
      );
    },
    selectedPreviewCount() {
      return this.previewProducts.filter(p => p.selected).length;
    },
    maxHoldingRatio() {
      if (!this.fundDetail || !this.fundDetail.topHoldings || this.fundDetail.topHoldings.length === 0) return 1;
      return Math.max(...this.fundDetail.topHoldings.map(h => h.ratio), 1);
    }
  },

  methods: {
    // ── Authentication ───────────────────────────────────────────
    async handleLogin() {
      this.loginError = '';
      this.loginLoading = true;
      try {
        const hash = await sha256(this.loginPassword);
        if (hash === PASSWORD_HASH) {
          createSession();
          this.authenticated = true;
          this.loginPassword = '';
          await this.loadData();
        } else {
          this.loginError = '密码错误，请重试';
        }
      } catch (e) {
        this.loginError = handleError('login', e);
      } finally {
        this.loginLoading = false;
      }
    },

    handleLogout() {
      destroySession();
      this.authenticated = false;
      this.institutions = [];
      this.selectedInstitution = null;
      this.instSearchText = '';
      this.currentView = 'query';
    },

    // ── Persistence (dual-layer) ─────────────────────────────────
    async loadData() {
      try {
        this.institutions = await DB.load();
      } catch (e) {
        this.showToast(handleError('loadData', e));
      }
    },

    async saveInst(inst) {
      const ok = await DB.upsert(inst);
      if (ok) {
        // Sync local cache after successful save
        cacheSet(this.institutions);
      } else {
        this.showToast('保存失败，数据已缓存到本地');
      }
    },

    // ── Toast ────────────────────────────────────────────────────
    showToast(msg) {
      if (this.toast.timer) clearTimeout(this.toast.timer);
      this.toast.message = msg;
      this.toast.visible = true;
      this.toast.timer = setTimeout(() => { this.toast.visible = false; }, 2000);
    },

    // ── View switching ───────────────────────────────────────────
    switchView(view) {
      this.currentView = view;
      this.queryResult = null;
      this.resultVisible = false;
      this.fundDetail = null;
      this.previewProducts = [];
      this.clearCompare();
      this.poolStatsInst = null;
      this.poolStats = null;
      this.productTypeFilter = '';
    },

    // ═══ Query View ══════════════════════════════════════════════
    selectInstitution(inst) {
      this.selectedInstitution = inst;
      this.instSearchText = inst.name;
      this.showInstDropdown = false;
      this.fundQuery = '';
      this.queryResult = null;
      this.resultVisible = false;
      this.fundSuggestions = [];
      this.fundTags = [];
      this.fundTagsLoading = false;
      this.fundDetail = null;
      nextTick(() => {
        if (this.$refs.fundInput) this.$refs.fundInput.focus();
      });
    },

    onFundQueryInput() {
      this.queryResult = null;
      this.resultVisible = false;
      this.matchedFund = null;
      this.fundTags = [];
      this.fundTagsLoading = false;
      this.fundDetail = null;
      if (!this.fundQuery.trim() || !this.selectedInstitution) {
        this.fundSuggestions = [];
        return;
      }
      const q = normalizeCode(this.fundQuery.trim());
      const results = [];
      for (const p of this.selectedInstitution.products) {
        const nameMatch = fuzzyMatch(this.fundQuery.trim(), p.name);
        const codeMatch = fuzzyMatch(q, p.code);
        const mgrMatch = p.manager ? fuzzyMatch(this.fundQuery.trim(), p.manager) : { match: false, score: 0 };
        const bestScore = Math.max(nameMatch.score, codeMatch.score, mgrMatch.score);
        if (nameMatch.match || codeMatch.match || mgrMatch.match) {
          results.push({ ...p, score: bestScore });
        }
      }
      results.sort((a, b) => b.score - a.score);
      this.fundSuggestions = results.slice(0, 8);
    },

    selectFund(fund) {
      this.fundQuery = fund.code + ' ' + fund.name;
      this.fundSuggestions = [];
      this.matchedFund = fund;
      this.queryResult = 'investable';
      this.fundTags = [];
      this.fundTagsLoading = true;
      this.fundDetail = null;
      nextTick(() => { this.resultVisible = true; });
      this.loadFundTags(fund.code);
    },

    checkFund() {
      if (!this.selectedInstitution || !this.fundQuery.trim()) return;
      const q = this.fundQuery.trim();
      const qNorm = this.normalizeCode(q);
      const found = this.selectedInstitution.products.find(p =>
        p.code === q || p.code === qNorm || p.name === q || p.name.includes(q) || p.code.startsWith(q)
      );
      if (found) {
        this.matchedFund = found;
        this.queryResult = 'investable';
        this.fundTags = [];
        this.fundTagsLoading = true;
        this.fundDetail = null;
        this.loadFundTags(found.code);
      } else {
        this.matchedFund = null;
        this.queryResult = 'not-investable';
        this.fundTags = [];
        this.fundTagsLoading = false;
        this.fundDetail = null;
      }
      this.fundSuggestions = [];
      nextTick(() => { this.resultVisible = true; });
    },

    async loadFundTags(code) {
      const bare = this.bareCode(code);
      if (!this._fundMetaCache) this._fundMetaCache = {};
      if (this._fundMetaCache[bare]) {
        const cached = this._fundMetaCache[bare];
        this.fundTags = generateFundTags(cached);
        this.fundDetail = cached;
        this.fundTagsLoading = false;
        return;
      }
      try {
        const [meta, apiType, holdings] = await Promise.all([
          fetchFundMeta(bare),
          fetchFundType(bare),
          fetchFundHoldings(bare)
        ]);
        if (apiType) meta.type = apiType;
        if (holdings && holdings.length > 0) meta.topHoldings = holdings;
        this._fundMetaCache[bare] = meta;
        if (this.matchedFund && this.bareCode(this.matchedFund.code) === bare) {
          this.fundTags = generateFundTags(meta);
          this.fundDetail = meta;
          this.fundTagsLoading = false;
        }
      } catch (e) {
        this.fundTagsLoading = false;
        this.fundTags = [];
      }
    },

    // ═══ Manage View ═════════════════════════════════════════════
    toggleExpand(id) {
      this.expandedInst = this.expandedInst === id ? null : id;
      this.productSearchText = '';
      this.productTypeFilter = '';
      this.clearCompare();
      // Auto-backfill types when expanding if any products are missing type
      if (this.expandedInst === id) {
        const inst = this.institutions.find(i => i.id === id);
        if (inst && inst.products.some(p => !p.type)) {
          this.backfillTypes(inst);
        }
        if (inst && inst.products.some(p => !p.manager)) {
          this.backfillManagers(inst);
        }
      }
    },

    filteredProducts(inst) {
      let list = inst.products;
      if (this.productTypeFilter) {
        list = list.filter(p => this.classifyProduct(p) === this.productTypeFilter);
      }
      if (!this.productSearchText.trim()) return list;
      return list.filter(p =>
        fuzzyMatch(this.productSearchText, p.name).match ||
        fuzzyMatch(this.productSearchText, p.code).match ||
        (p.manager && fuzzyMatch(this.productSearchText, p.manager).match)
      );
    },

    async addInstitution() {
      const name = this.newInstName.trim();
      if (!name) { this.showToast('请输入机构名称'); return; }
      if (this.institutions.some(i => i.name === name)) {
        this.showToast('该机构已存在');
        return;
      }
      const now = new Date().toISOString();
      const inst = { id: 'inst_' + Date.now(), name, products: [], createdAt: now, updatedAt: now };
      if (await DB.upsert(inst)) {
        this.institutions.push(inst);
        cacheSet(this.institutions);
        this.newInstName = '';
        this.showAddInstModal = false;
        this.showToast('机构添加成功');
      } else {
        this.showToast('添加失败，请检查网络');
      }
    },

    confirmDeleteInst(inst) {
      this.deleteTarget = inst;
    },

    async deleteInstitution() {
      if (await DB.remove(this.deleteTarget.id)) {
        this.institutions = this.institutions.filter(i => i.id !== this.deleteTarget.id);
        cacheSet(this.institutions);
        if (this.selectedInstitution && this.selectedInstitution.id === this.deleteTarget.id) {
          this.selectedInstitution = null;
          this.instSearchText = '';
        }
        this.deleteTarget = null;
        this.showToast('已删除');
      } else {
        this.deleteTarget = null;
        this.showToast('删除失败，请检查网络');
      }
    },

    async addProduct(inst) {
      const code = this.normalizeCode(this.newProductCode.trim());
      const name = this.newProductName.trim().replace(/\s+/g, '');
      if (!code || !name) { this.showToast('请填写代码和名称'); return; }
      if (inst.products.some(p => p.code === code)) {
        this.showToast('该代码已存在');
        return;
      }
      // Fetch fund meta (type + manager) at add time and persist with product
      const bare = this.bareCode(code);
      let fundType = null;
      let manager = null;
      try {
        const meta = await fetchFundMeta(bare);
        if (meta) {
          fundType = meta.type;
          manager = extractManagerNames(meta);
        }
      } catch (_) {
        try { fundType = await fetchFundType(bare); } catch (_) {}
      }
      const product = { code, name };
      if (fundType) product.type = fundType;
      if (manager) product.manager = manager;
      inst.products.push(product);
      inst.updatedAt = new Date().toISOString();
      await this.saveInst(inst);
      this.newProductCode = '';
      this.newProductName = '';
      this.showToast('产品已添加');
    },

    async backfillTypes(inst) {
      const missing = inst.products.filter(p => !p.type);
      if (missing.length === 0) return;
      this.backfillLoading = true;
      await _loadFundTypeMap(); // ensure map is ready
      let filled = 0;
      for (const p of missing) {
        const t = fetchFundType(this.bareCode(p.code));
        // fetchFundType returns sync when map is ready
        const type = t instanceof Promise ? await t : t;
        if (type) { p.type = type; filled++; }
      }
      if (filled > 0) {
        inst.updatedAt = new Date().toISOString();
        await this.saveInst(inst);
      }
      this.backfillLoading = false;
      this.showToast(`分类补全完成：${filled}/${missing.length} 成功`);
    },

    async backfillManagers(inst) {
      const missing = inst.products.filter(p => !p.manager);
      if (missing.length === 0) return;
      this.backfillManagerLoading = true;
      this.backfillManagerProgress = `0/${missing.length}`;
      let filled = 0;
      for (let i = 0; i < missing.length; i++) {
        const p = missing[i];
        this.backfillManagerProgress = `${i + 1}/${missing.length}`;
        try {
          const meta = await fetchFundMeta(this.bareCode(p.code));
          const names = extractManagerNames(meta);
          if (names) { p.manager = names; filled++; }
          if (!p.type && meta && meta.type) { p.type = meta.type; }
        } catch (_) {}
      }
      if (filled > 0) {
        inst.updatedAt = new Date().toISOString();
        await this.saveInst(inst);
      }
      this.backfillManagerLoading = false;
      this.backfillManagerProgress = '';
      this.showToast(`经理补全完成：${filled}/${missing.length} 成功`);
    },

    async removeProduct(inst, code) {
      inst.products = inst.products.filter(p => p.code !== code);
      inst.updatedAt = new Date().toISOString();
      await this.saveInst(inst);
    },

    // ── Helper methods for templates ─────────────────────────────
    formatReturn(val) {
      if (val == null || val === '') return '--';
      const n = parseFloat(val);
      if (isNaN(n)) return '--';
      return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    },
    returnClass(val) {
      if (val == null || val === '') return 'flat';
      const n = parseFloat(val);
      if (isNaN(n) || n === 0) return 'flat';
      return n > 0 ? 'up' : 'down';
    },

    // ── Pool Stats (Feature 2) ───────────────────────────────────
    async loadPoolStats(inst) {
      if (this.poolStatsInst === inst.id) {
        this.poolStatsInst = null;
        this.poolStats = null;
        return;
      }
      this.poolStatsInst = inst.id;
      // Classify products by name heuristic first
      const typeMap = { '股票': 0, '混合': 0, '债券': 0, '货币': 0, 'QDII': 0, '其他': 0 };
      const colorMap = { '股票': '#3b82f6', '混合': '#8b5cf6', '债券': '#10b981', '货币': '#f59e0b', 'QDII': '#ec4899', '其他': '#9ca3af' };
      const clsMap = { '股票': 'stock', '混合': 'mixed', '债券': 'bond', '货币': 'money', 'QDII': 'qdii', '其他': 'other' };
      for (const p of inst.products) {
        const cls = this.classifyProduct(p);
        if (cls in typeMap) typeMap[cls]++;
        else typeMap['其他']++;
      }
      const total = inst.products.length || 1;
      const segments = Object.entries(typeMap)
        .filter(([, c]) => c > 0)
        .map(([type, count]) => ({
          type, count,
          pct: Math.round(count / total * 100),
          color: colorMap[type],
          cls: clsMap[type]
        }))
        .sort((a, b) => b.count - a.count);
      this.poolStats = { segments, totalScale: null, loading: true };
      // Async: sample up to 20 products for scale estimation
      const sample = inst.products.slice(0, 20);
      let scaleSum = 0, scaleCount = 0;
      const batchSize = 5;
      for (let i = 0; i < sample.length; i += batchSize) {
        const batch = sample.slice(i, i + batchSize);
        const results = await Promise.allSettled(
          batch.map(async p => {
            try {
              const resp = await fetch(
                'https://fundmobapi.eastmoney.com/FundMNewApi/FundMNFInfo?plat=Android&appType=ttjj&product=EFund&Version=1&deviceid=1&Fcodes=' + this.bareCode(p.code)
              );
              const json = await resp.json();
              const fgs = json?.Datas?.[0]?.FundScale;
              if (fgs) { const m = fgs.match(/([\d.]+)/); if (m) return parseFloat(m[1]); }
              return null;
            } catch (_) { return null; }
          })
        );
        for (const r of results) {
          if (r.status === 'fulfilled' && r.value != null) {
            scaleSum += r.value;
            scaleCount++;
          }
        }
      }
      if (this.poolStatsInst === inst.id && this.poolStats) {
        if (scaleCount > 0) {
          const avgScale = scaleSum / scaleCount;
          const estimated = (avgScale * inst.products.length).toFixed(1);
          this.poolStats.totalScale = estimated;
        }
        this.poolStats.loading = false;
      }
    },

    // ── Product Type Filter (Feature 4) ──────────────────────────
    getProductTypes(inst) {
      const types = new Set();
      for (const p of inst.products) {
        types.add(this.classifyProduct(p));
      }
      return [...types].sort();
    },

    classifyProduct(p) {
      // Use persisted fund type (二级分类) if available
      if (p.type) {
        const t = p.type;
        if (/QDII|海外|全球/.test(t)) return 'QDII';
        if (/货币/.test(t)) return '货币';
        if (/债/.test(t)) return '债券';
        if (/股票|指数/.test(t)) return '股票';
        if (/混合|灵活|平衡|偏股|偏债/.test(t)) return '混合';
        return '其他';
      }
      // Fallback: name-based heuristic
      const nm = (p.name || '').toUpperCase();
      if (/QDII|海外|全球|美国|港股通/.test(nm)) return 'QDII';
      if (/货币|现金/.test(nm)) return '货币';
      if (/债|纯债|信用|利率/.test(nm)) return '债券';
      if (/股票|指数|ETF|LOF|量化|成长|价值/.test(nm)) return '股票';
      if (/混合|灵活|平衡|配置|稳健|优选|精选/.test(nm)) return '混合';
      return '其他';
    },

    // ── Compare (Feature 3) ──────────────────────────────────────
    toggleCompare(product, event) {
      if (event.target.checked) {
        if (this.compareList.length >= 3) {
          event.target.checked = false;
          this.showToast('最多选择3只基金进行对比');
          return;
        }
        this.compareList.push(product);
        this.compareSet.add(product.code);
      } else {
        this.compareList = this.compareList.filter(p => p.code !== product.code);
        this.compareSet.delete(product.code);
      }
    },
    toggleAllCompare(inst, event) {
      if (event.target.checked) {
        const filtered = this.filteredProducts(inst).slice(0, 3);
        this.compareList = [...filtered];
        this.compareSet = new Set(filtered.map(p => p.code));
      } else {
        this.clearCompare();
      }
    },
    isAllCompareChecked(inst) {
      const filtered = this.filteredProducts(inst);
      return filtered.length > 0 && filtered.length <= 3 && filtered.every(p => this.compareSet.has(p.code));
    },
    clearCompare() {
      this.compareList = [];
      this.compareSet = new Set();
      this.showCompareModal = false;
      this.compareData = [];
    },
    isBestReturn(fund, key) {
      if (this.compareData.length < 2) return false;
      const vals = this.compareData.map(f => f.returns && f.returns[key] != null ? parseFloat(f.returns[key]) : -Infinity);
      const max = Math.max(...vals);
      if (max === -Infinity) return false;
      const v = fund.returns && fund.returns[key] != null ? parseFloat(fund.returns[key]) : -Infinity;
      return v === max;
    },
    async showCompareModal_() {
      this.showCompareModal = true;
      this.compareLoading = true;
      this.compareData = [];
      const results = await Promise.allSettled(
        this.compareList.map(async p => {
          const bare = this.bareCode(p.code);
          if (!this._fundMetaCache) this._fundMetaCache = {};
          if (this._fundMetaCache[bare]) {
            return { code: p.code, ...this._fundMetaCache[bare] };
          }
          const [meta, apiType] = await Promise.all([
            fetchFundMeta(bare),
            fetchFundType(bare)
          ]);
          if (apiType) meta.type = apiType;
          this._fundMetaCache[bare] = meta;
          return { code: p.code, ...meta };
        })
      );
      this.compareData = results
        .filter(r => r.status === 'fulfilled')
        .map(r => r.value);
      this.compareLoading = false;
    },

    // ═══ Import View ═════════════════════════════════════════════
    selectImportInst(inst) {
      this.importTargetInst = inst;
      this.importInstSearch = inst.name;
      this.showImportInstDropdown = false;
    },

    async getOrCreateImportTarget() {
      if (this.importTargetInst) return this.importTargetInst;
      const name = this.importInstSearch.trim();
      if (!name) { this.showToast('请先选择或输入机构名称'); return null; }
      let inst = this.institutions.find(i => i.name === name);
      if (!inst) {
        const now = new Date().toISOString();
        inst = { id: 'inst_' + Date.now(), name, products: [], createdAt: now, updatedAt: now };
        if (await DB.upsert(inst)) {
          this.institutions.push(inst);
          cacheSet(this.institutions);
        } else {
          this.showToast('创建机构失败，请检查网络'); return null;
        }
      }
      this.importTargetInst = inst;
      return inst;
    },

    // ── Excel ────────────────────────────────────────────────────
    handleExcelUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      this.parseExcel(file);
      event.target.value = '';
    },
    handleExcelDrop(event) {
      this.excelDragover = false;
      const file = event.dataTransfer.files[0];
      if (file) this.parseExcel(file);
    },
    async parseExcel(file) {
      try {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data);
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let codeCol = -1, nameCol = -1, startRow = 0;
        for (let r = 0; r < Math.min(rows.length, 10); r++) {
          if (!rows[r]) continue;
          const row = rows[r].map(c => String(c || ''));
          for (let c = 0; c < row.length; c++) {
            const cell = row[c];
            if (cell.includes('代码') || cell.includes('编码') || cell.includes('基金代码')) codeCol = c;
            if (cell.includes('名称') || cell.includes('基金名') || cell.includes('产品名')) nameCol = c;
          }
          if (codeCol >= 0 && nameCol >= 0) { startRow = r + 1; break; }
        }
        if (codeCol < 0) { codeCol = 0; nameCol = 1; startRow = 1; }
        if (nameCol < 0) nameCol = codeCol === 0 ? 1 : 0;

        const products = [];
        for (let r = startRow; r < rows.length; r++) {
          if (!rows[r]) continue;
          let code = String(rows[r][codeCol] || '').trim().replace(/'/g, '');
          const name = String(rows[r][nameCol] || '').trim().replace(/\s+/g, '');
          if (code && name) {
            code = this.normalizeCode(code);
            products.push({ code, name, selected: true, verifyStatus: null, officialName: '', nameCorrected: false });
          }
        }

        if (products.length === 0) {
          this.showToast('未识别到有效产品数据');
          return;
        }
        this.previewProducts = products;
        this.showToast(`已识别 ${products.length} 条产品`);
        this.verifyPreviewProducts();
      } catch (e) {
        this.showToast('Excel解析失败: ' + handleError('parseExcel', e));
      }
    },

    // ── PDF (lazy-loaded) ────────────────────────────────────────
    async handlePdfUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';

      this.isProcessing = true;
      this.ocrProgress = 0;
      this.ocrStatus = '正在加载PDF引擎...';

      try {
        const pdfjsLib = await loadPdfJs();
        this.ocrStatus = '正在解析PDF...';

        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const totalPages = pdf.numPages;
        let fullText = '';

        for (let i = 1; i <= totalPages; i++) {
          this.ocrProgress = Math.round((i / totalPages) * 100);
          this.ocrStatus = `解析第 ${i}/${totalPages} 页...`;
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          const pageText = content.items.map(item => item.str).join(' ');
          fullText += pageText + '\n';
        }

        const products = [];
        const seen = new Set();
        const lines = fullText.split('\n');
        for (let line of lines) {
          line = this.cleanOcrText(line);
          const regex = /(\d{6}\s*[.\u3002·]\s*\w{2}|\d{6}\s*(?:OF|of|oF|Of)|\d{3,6}(?=[\s\u4e00-\u9fa5|｜,，;；）)\]\}]|$))/g;
          let match;
          while ((match = regex.exec(line)) !== null) {
            const code = this.normalizeCode(match[1]);
            if (seen.has(code)) continue;
            seen.add(code);
            const parts = line.split(match[0]);
            let name = '';
            const after = (parts[1] || '').replace(/[\s|｜,，、;；()（）]+/g, '').trim();
            const before = (parts[0] || '').replace(/[\s|｜,，、;；()（）]+/g, '').trim();
            const chineseAfter = after.match(/[\u4e00-\u9fa5A-Za-z][\u4e00-\u9fa5A-Za-z0-9]+/);
            const chineseBefore = before.match(/[\u4e00-\u9fa5A-Za-z][\u4e00-\u9fa5A-Za-z0-9]*$/);
            if (chineseAfter) {
              name = chineseAfter[0];
            } else if (chineseBefore) {
              name = chineseBefore[0];
            }
            products.push({ code, name: name.replace(/\s+/g, '') || '未识别名称', selected: true, verifyStatus: null, officialName: '', nameCorrected: false });
          }
        }

        this.isProcessing = false;
        this.ocrStatus = '';
        if (products.length > 0) {
          this.previewProducts = products;
          this.showToast(`已从PDF中识别 ${products.length} 条产品`);
          this.verifyPreviewProducts();
        } else {
          this.showToast('未在PDF中识别到有效的基金代码（如005787.OF或005787）');
        }
      } catch (e) {
        this.isProcessing = false;
        this.ocrStatus = '';
        this.showToast('PDF解析失败: ' + handleError('handlePdfUpload', e));
      }
    },

    // ── Image preprocessing ──────────────────────────────────────
    async preprocessImage(file) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const maxDim = Math.max(img.width, img.height);
          const scale = maxDim < 1800 ? Math.min(3, 1800 / maxDim) : 1;
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);

          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);

          const id = ctx.getImageData(0, 0, w, h);
          const d = id.data;
          for (let i = 0; i < d.length; i += 4) {
            const g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            const v = Math.min(255, Math.max(0, Math.round((g - 128) * 1.5 + 128)));
            d[i] = d[i + 1] = d[i + 2] = v;
          }
          ctx.putImageData(id, 0, 0);
          canvas.toBlob(resolve, 'image/png');
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
        img.src = url;
      });
    },

    // ── OCR (lazy-loaded Tesseract.js) ───────────────────────────
    async handleImageOCR(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';

      this.isProcessing = true;
      this.ocrProgress = 0;
      this.ocrStatus = '正在加载OCR引擎...';

      try {
        // Lazy load Tesseract.js only when actually needed
        await loadTesseract();

        this.ocrStatus = '正在预处理图片...';
        const enhanced = await this.preprocessImage(file);

        this.ocrStatus = '正在初始化OCR引擎...';
        const worker = await Tesseract.createWorker(['chi_sim', 'eng'], 1, {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              this.ocrProgress = Math.round(m.progress * 100);
              this.ocrStatus = `识别中... ${this.ocrProgress}%`;
            } else if (m.status === 'loading language traineddata') {
              this.ocrStatus = '正在下载语言包...';
              this.ocrProgress = Math.round(m.progress * 100);
            }
          }
        });

        await worker.setParameters({ tessedit_pageseg_mode: '6' });
        const { data: { text } } = await worker.recognize(enhanced);
        await worker.terminate();

        const lines = text.split('\n').filter(l => l.trim());
        const products = [];
        for (let line of lines) {
          line = this.cleanOcrText(line);
          const codeMatch = line.match(/(\d{6}\s*[.\u3002·]\s*\w{2}|\d{6}\s*(?:OF|of|oF|Of)|\d{3,6}(?=[\s\u4e00-\u9fa5|｜,，;；）)\]\}]|$))/);
          if (codeMatch) {
            const code = this.normalizeCode(codeMatch[1]);
            const rawName = line.replace(codeMatch[0], '').trim();
            const name = rawName.replace(/[^\u4e00-\u9fa5\u3400-\u4dbfa-zA-Z0-9\-\uff08\uff09\(\)]/g, '').trim();
            products.push({ code, name: name || '未识别名称', selected: true, verifyStatus: null, officialName: '', nameCorrected: false });
          }
        }

        this.previewProducts = products;
        this.isProcessing = false;
        if (products.length > 0) {
          this.ocrStatus = '';
          this.showToast(`识别完成，共 ${products.length} 条记录`);
          this.verifyPreviewProducts();
        } else {
          this.ocrStatus = '';
          this.showToast('未识别到有效的基金代码（如005787.OF或005787）');
        }
      } catch (e) {
        this.isProcessing = false;
        this.ocrStatus = '';
        this.showToast('OCR识别失败: ' + handleError('handleImageOCR', e));
      }
    },

    // ── OCR text cleaning (8-step pipeline) ──────────────────────
    cleanOcrText(text) {
      text = text.replace(/[\u2018\u2019\u201c\u201d\u0022\u0027\u0060\uff02\uff07\u2033\u2032]/g, '');
      text = text.replace(/^[\s\u3000\u3002\u00b7\u2022\uff0e\uff01\uff1f\u30fb\u300c\u300d\u300e\u300f\u3010\u3011\u300a\u300b]+/, '');
      text = text.replace(/[\s\u3000\u3002\u00b7\u2022\uff0e\uff01\uff1f\u30fb\u300c\u300d\u300e\u300f\u3010\u3011\u300a\u300b]+$/, '');
      text = text.replace(/(\d)[\s\u3000]+(\d)/g, '$1$2');
      text = text.replace(/(\d)[lI\|](\d)/g, '$11$2');
      text = text.replace(/(\d)[lI\|](\d)/g, '$11$2');
      text = text.replace(/(\d)[Oo](\d)/g, '$10$2');
      text = text.replace(/(\d)[Oo](\d)/g, '$10$2');
      text = text.replace(/\bO(\d{5})\b/g, '0$1');
      text = text.replace(/\b[lI](\d{5})\b/g, '1$1');
      text = text.replace(/(\d{6})\s*[.\u3002·,，]\s*(OF|of|oF|Of)/g, '$1.$2');
      text = text.replace(/(\d{6})\s+(OF|of|oF|Of)\b/g, '$1.$2');
      text = text.replace(/\s+[-+]?\d{1,6}[.,]\d{2,4}%?\s*$/, '');
      text = text.replace(/\s+\d{4}[-\/]\d{2}[-\/]\d{2}\s*$/, '');
      return text;
    },

    bareCode(code) {
      return code.replace(/\.\w{2,3}$/i, '');
    },

    fundNameKey(name) {
      return name.replace(/\s+/g, '').replace(/[A-Za-z0-9（）()【】]/g, '').slice(0, 6);
    },

    // ── Fund verification ────────────────────────────────────────
    async verifySingleFund(p) {
      const bare = this.bareCode(p.code);
      try {
        const data = await jsonp(
          'https://fundsuggest.eastmoney.com/FundSearch/api/FundSearchAPI.ashx?m=1&key=' +
          encodeURIComponent(bare)
        );

        const list = Array.isArray(data?.Datas) ? data.Datas
          : Array.isArray(data) ? data
          : Array.isArray(data?.EastmoneyFund_OverAll?.FundBaseInfoList) ? data.EastmoneyFund_OverAll.FundBaseInfoList
          : Array.isArray(data?.Data) ? data.Data
          : [];

        let hit = list.find(f => (f.CODE || f.FundCode || f.FCODE || f.code || '') === bare);
        if (!hit && list.length === 1) hit = list[0];
        if (!hit) hit = list.find(f => String(f.CODE || f.FundCode || f.FCODE || f.code || '').startsWith(bare));

        if (hit) {
          const officialName = (hit.NAME || hit.FundFullName || hit.FundName || hit.name || '').replace(/\s+/g, '');
          if (officialName) {
            p.officialName = officialName;
            p.name = officialName;
            p.nameCorrected = true;
          }
          p.verifyStatus = 'ok';
          return;
        }

        const gz = await fundgzLookup(bare);
        if (gz && gz.fundcode === bare) {
          const officialName = (gz.name || '').replace(/\s+/g, '');
          if (officialName) {
            p.officialName = officialName;
            p.name = officialName;
            p.nameCorrected = true;
          }
          p.verifyStatus = 'ok';
        } else {
          p.verifyStatus = 'notfound';
        }
      } catch (_) {
        p.verifyStatus = null;
      }
    },

    async verifyPreviewProducts() {
      const snapshot = this.previewProducts;
      const items = snapshot.filter(p => this.isValidCode(p.code));
      items.forEach(p => { p.verifyStatus = 'checking'; });
      const BATCH = 5;
      for (let i = 0; i < items.length; i += BATCH) {
        if (this.previewProducts !== snapshot) break;
        await Promise.all(items.slice(i, i + BATCH).map(p => this.verifySingleFund(p)));
      }
    },

    normalizeCode(code) {
      code = code.trim();
      code = code.replace(/[\u3002·,，]/g, '.');
      code = code.replace(/\s*\.\s*/g, '.');
      const noSepMatch = code.match(/^(\d{6})\s*(OF|of|oF|Of)$/);
      if (noSepMatch) return noSepMatch[1] + '.OF';
      if (/^\d{6}$/.test(code)) return code + '.OF';
      if (/^\d{1,5}$/.test(code)) return code.padStart(6, '0') + '.OF';
      const shortWithSuffix = code.match(/^(\d{1,5})\.(\w{2})$/);
      if (shortWithSuffix) return shortWithSuffix[1].padStart(6, '0') + '.' + shortWithSuffix[2].toUpperCase();
      if (/^\d{6}\.\w{2}$/.test(code)) return code.toUpperCase();
      return code;
    },

    isValidCode(code) {
      return /^\d{1,6}(\.\w{2})?$/.test(code);
    },

    async confirmImport() {
      const target = await this.getOrCreateImportTarget();
      if (!target) return;

      const selected = this.previewProducts.filter(p => p.selected && p.code && p.name);
      const existingCodes = new Set(target.products.map(p => p.code));
      let added = 0, skipped = 0;

      const newProducts = [];
      for (const p of selected) {
        if (existingCodes.has(p.code)) {
          skipped++;
        } else {
          newProducts.push(p);
          existingCodes.add(p.code);
          added++;
        }
      }

      // Assign fund types from preloaded map (sync when map is ready)
      await _loadFundTypeMap();
      for (const p of newProducts) {
        const product = { code: p.code.trim(), name: p.name.trim().replace(/\s+/g, '') };
        const type = fetchFundType(this.bareCode(p.code));
        const resolved = type instanceof Promise ? await type : type;
        if (resolved) product.type = resolved;
        target.products.push(product);
      }

      target.updatedAt = new Date().toISOString();
      await this.saveInst(target);
      this.previewProducts = [];
      this.showToast(`导入完成：新增 ${added} 条${skipped > 0 ? '，跳过 ' + skipped + ' 条重复' : ''}`);
    },

    // ── Data Export/Import ────────────────────────────────────────
    exportData() {
      const data = JSON.stringify(this.institutions, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `机构产品池备份_${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('备份已下载');
    },

    importBackup(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) throw new Error('格式错误');
          for (const inst of data) {
            await DB.upsert(inst);
          }
          this.institutions = await DB.load();
          this.showToast(`已导入 ${data.length} 个机构`);
        } catch (err) {
          this.showToast('备份文件格式错误');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
  },

  watch: {
    showAddInstModal(v) {
      if (v) nextTick(() => { if (this.$refs.newInstInput) this.$refs.newInstInput.focus(); });
    }
  },

  async mounted() {
    // If already authenticated (valid session), load data immediately
    if (this.authenticated) {
      await this.loadData();
    } else {
      // Auto-focus login input
      nextTick(() => { if (this.$refs.loginInput) this.$refs.loginInput.focus(); });
    }

    // Close dropdowns on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        this.showInstDropdown = false;
        this.showImportInstDropdown = false;
      }
    });

    // Enter key handler for fund query
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && this.currentView === 'query' && this.fundQuery) {
        if (this.fundSuggestions.length > 0) {
          this.selectFund(this.fundSuggestions[0]);
        } else {
          this.checkFund();
        }
      }
    });
  }
}).mount('#app');
</script>
