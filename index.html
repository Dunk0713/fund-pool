<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>中欧基金 · 机构产品池查询</title>

  <!-- ═══════════════════════════════════════════════════════════════
       Core dependencies (always needed)
       ═══════════════════════════════════════════════════════════════ -->
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- Tesseract.js & PDF.js are lazy-loaded on demand — see Section 2 in JS -->

  <style>
    /* ═══════════════════════════════════════════════════════════════
       Section 1 · Design Tokens & Reset
       ═══════════════════════════════════════════════════════════════ */

    /* ── 1.1 CSS Variables ─────────────────────────────────────── */
    :root {
      /* Brand — 深青黛 × 暖铜金 */
      --brand-ink: #0F2A3F;
      --brand-ink-hover: #173B57;
      --brand-ink-active: #0A1D2C;
      --brand-accent: #B8935A;
      --brand-accent-soft: #F2EBDC;
      --brand-tint: #EEF2F5;

      /* Semantic — 红涨绿跌 (降饱和) */
      --pos: #C0392B;
      --pos-soft: #FBEDEA;
      --neg: #1E7F5C;
      --neg-soft: #E8F2EE;
      --warn: #B46A00;
      --warn-soft: #FBF2E1;
      --ok: #1E7F5C;
      --ok-soft: #E8F2EE;
      --info: #2C5E8F;
      --info-soft: #EBF1F7;

      /* Neutral 9-step */
      --ink-900: #0B1520;
      --ink-800: #1A2433;
      --ink-600: #47556B;
      --ink-500: #6B7789;
      --ink-400: #94A0B3;
      --ink-300: #C5CDD8;
      --ink-200: #E1E6ED;
      --ink-100: #F0F3F7;
      --ink-050: #F7F9FB;
      --paper: #FFFFFF;

      /* Type scale — 6 tiers */
      --fs-display: 26px;
      --lh-display: 32px;
      --fs-h1: 18px;
      --lh-h1: 26px;
      --fs-h2: 15px;
      --lh-h2: 22px;
      --fs-body: 14px;
      --lh-body: 20px;
      --fs-sm: 13px;
      --lh-sm: 18px;
      --fs-xs: 11px;
      --lh-xs: 14px;

      /* Spacing — 8pt grid */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 24px;
      --sp-6: 32px;

      /* Radius — 3 tiers */
      --r-sm: 4px;
      --r-md: 8px;
      --r-lg: 12px;

      /* Shadow — outlined-card style */
      --sh-1: 0 1px 0 rgba(15,42,63,.06), 0 1px 2px rgba(15,42,63,.04);
      --sh-2: 0 2px 4px rgba(15,42,63,.06), 0 4px 12px rgba(15,42,63,.08);
      --sh-3: 0 8px 24px rgba(15,42,63,.12);

      /* Motion */
      --dur-fast: 120ms;
      --dur: 180ms;
      --dur-slow: 280ms;
      --ease: cubic-bezier(0.2, 0, 0, 1);

      /* ── Legacy aliases (preserve backward compat) ─────────── */
      --primary: var(--brand-ink);
      --primary-light: var(--brand-tint);
      --success: var(--ok);
      --success-bg: var(--ok-soft);
      --danger: var(--pos);
      --danger-bg: var(--pos-soft);
      --bg: var(--ink-100);
      --card: var(--paper);
      --text: var(--ink-800);
      --text-secondary: var(--ink-600);
      --text-tertiary: var(--ink-500);
      --border: var(--ink-200);
      --radius: var(--r-lg);
      --radius-sm: var(--r-md);
      --shadow: var(--sh-1);
      --shadow-md: var(--sh-2);
      --transition: var(--dur) var(--ease);
    }

    /* ── 1.2 Reset & Base ──────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      font-variant-numeric: tabular-nums;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* Tabular nums for all digit-heavy elements */
    .num, .product-code, .fund-code, td, th, input[type="number"] {
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    #app {
      min-height: 100vh;
      padding-bottom: 94px; /* 72px bottom-nav + 22px compliance bar */
    }

    /* ═══════════════════════════════════════════════════════════════
       Section 2 · Layout
       ═══════════════════════════════════════════════════════════════ */

    /* ── 2.1 Header ────────────────────────────────────────────── */
    .header {
      background: var(--card);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      min-width: 0;
    }
    .header h1 {
      font-size: var(--fs-h2);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
      line-height: 1.3;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 span {
      color: var(--brand-ink);
    }
    .header-logo-mark {
      width: 24px;
      height: 24px;
      border-radius: var(--r-sm);
      background: var(--brand-ink);
      color: var(--paper);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .header-subtitle {
      font-size: var(--fs-xs);
      color: var(--text-secondary);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-role-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 500;
      background: var(--brand-tint);
      color: var(--brand-ink);
      border-radius: var(--r-sm);
      letter-spacing: 0.3px;
    }
    .header-data-stamp {
      font-size: 10px;
      color: var(--ink-500);
      font-variant-numeric: tabular-nums;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary-light);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }
    .logout-btn {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }
    .logout-btn:hover { color: var(--danger); border-color: var(--danger); }

    /* ── 2.2 Container ─────────────────────────────────────────── */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ── 2.3 Bottom Navigation ─────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 22px; /* leave room for compliance bar */
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 8px;
      z-index: 200;
    }
    /* 合规条 — 全站常驻底部 22px */
    .compliance-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 22px;
      padding: 0 12px;
      background: var(--ink-100);
      border-top: 1px solid var(--ink-200);
      color: var(--ink-500);
      font-size: var(--fs-xs);
      line-height: 22px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 201;
      letter-spacing: 0.2px;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 14px 4px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--ink-500);
      font-size: var(--fs-xs);
      font-weight: 500;
      transition: color var(--dur) var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 28px;
      height: 2px;
      background: var(--brand-ink);
      border-radius: 0 0 2px 2px;
      transition: transform var(--dur) var(--ease);
    }
    .nav-item.active {
      color: var(--brand-ink);
    }
    .nav-item.active::before {
      transform: translateX(-50%) scaleX(1);
    }
    .nav-item svg { width: 22px; height: 22px; stroke-width: 1.5; }

    /* ═══════════════════════════════════════════════════════════════
       Section 3 · Components
       ═══════════════════════════════════════════════════════════════ */

    /* ── 3.1 Cards (outlined style) ─────────────────────────────── */
    .card {
      background: var(--paper);
      border: 1px solid var(--ink-200);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-1);
      padding: var(--sp-5);
      margin-bottom: var(--sp-3);
    }
    .inst-card {
      background: var(--paper);
      border: 1px solid var(--ink-200);
      border-radius: var(--r-lg);
      box-shadow: var(--sh-1);
      margin-bottom: var(--sp-3);
      overflow: hidden;
      transition: border-color var(--dur) var(--ease);
    }
    .inst-card:hover {
      border-color: var(--ink-300);
    }
    .inst-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      transition: background var(--transition);
    }
    .inst-header:active { background: #f9fafb; }
    .inst-name {
      font-size: 16px;
      font-weight: 600;
    }
    .inst-meta {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    .inst-actions {
      display: flex;
      gap: 8px;
    }
    .result-card {
      position: relative;
      padding: var(--sp-5) var(--sp-5) var(--sp-5) var(--sp-6);
      background: var(--paper);
      border: 1px solid var(--ink-200);
      border-radius: var(--r-lg);
      margin-top: var(--sp-4);
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
      transform: translateY(4px);
      opacity: 0;
      display: flex;
      align-items: flex-start;
      gap: var(--sp-4);
      box-shadow: var(--sh-1);
    }
    .result-card.visible {
      transform: translateY(0);
      opacity: 1;
    }
    .result-card::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 4px;
      border-radius: var(--r-lg) 0 0 var(--r-lg);
    }
    .result-card.investable::before { background: var(--ok); }
    .result-card.not-investable::before { background: var(--warn); }
    .result-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }
    .result-icon svg { width: 100%; height: 100%; display: block; }
    .result-icon svg { width: 28px; height: 28px; stroke-width: 1.5; }
    .result-card.investable .result-icon { color: var(--ok); }
    .result-card.not-investable .result-icon { color: var(--warn); }
    .result-body {
      flex: 1;
      min-width: 0;
      text-align: left;
    }
    .result-text {
      font-size: var(--fs-h1);
      line-height: var(--lh-h1);
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--ink-900);
      letter-spacing: -0.2px;
    }
    .result-card.investable .result-text { color: var(--ink-900); }
    .result-card.not-investable .result-text { color: var(--ink-900); }
    .result-detail {
      font-size: var(--fs-sm);
      line-height: var(--lh-sm);
      color: var(--text-secondary);
    }

    /* ── Fund Tags (semantic 3-color system) ───────────────────── */
    .fund-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      margin-top: var(--sp-4);
      animation: fadeInTags var(--dur) var(--ease);
    }
    @keyframes fadeInTags {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fund-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--r-sm);
      font-size: var(--fs-xs);
      line-height: 1.6;
      font-weight: 500;
      white-space: nowrap;
      border: 1px solid transparent;
      letter-spacing: 0.1px;
    }
    /* Neutral — 大多数事实性标签（类型、经理、成立年限） */
    .tag-blue, .tag-gray {
      background: var(--ink-100);
      color: var(--ink-800);
      border-color: var(--ink-200);
    }
    /* Emphasis — 强调（规模、收益等关键指标） */
    .tag-green, .tag-gold {
      background: var(--brand-tint);
      color: var(--brand-ink);
      border-color: var(--ink-200);
    }
    /* Caution — 风险/警示（小规模、QDII、经理变更等） */
    .tag-amber, .tag-orange, .tag-red {
      background: var(--warn-soft);
      color: var(--warn);
      border-color: rgba(180,106,0,.2);
    }

    .fund-tags-loading {
      display: flex;
      gap: var(--sp-2);
      margin-top: var(--sp-4);
    }
    .tag-skeleton {
      display: inline-block;
      width: 68px;
      height: 22px;
      border-radius: var(--r-sm);
      background: linear-gradient(90deg, var(--ink-100) 25%, var(--ink-050) 50%, var(--ink-100) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Fund Detail Card ───────────────────────────────────────── */
    .fund-detail-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-top: 14px;
      overflow: hidden;
      animation: fadeInUp 0.3s ease forwards;
    }
    .fund-detail-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .fund-detail-section:last-child { border-bottom: none; }
    .fund-detail-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-tertiary);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }
    .nav-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .nav-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .nav-change {
      font-size: 15px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .nav-change.up { color: #dc2626; }
    .nav-change.down { color: #16a34a; }
    .nav-date {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    .returns-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0;
    }
    .return-cell {
      text-align: center;
      padding: 6px 2px;
    }
    .return-cell .label {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .return-cell .value {
      font-size: 14px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .return-cell .value.up { color: #dc2626; }
    .return-cell .value.down { color: #16a34a; }
    .return-cell .value.flat { color: var(--text-tertiary); }
    .manager-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .manager-row + .manager-row { border-top: 1px solid #f3f4f6; }
    .manager-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .manager-info {
      font-size: 12px;
      color: var(--text-tertiary);
      text-align: right;
    }
    .holdings-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .holding-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    .holding-rank {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      background: #f3f4f6;
      color: var(--text-tertiary);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .holding-rank.top3 { background: var(--primary-light); color: var(--primary); }
    .holding-name { flex: 1; color: var(--text); }
    .holding-ratio {
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .holding-bar-bg {
      width: 50px;
      height: 6px;
      background: #f3f4f6;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .holding-bar {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      opacity: 0.6;
    }
    .fund-detail-loading {
      padding: 32px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }
    .fund-detail-loading .dot-pulse {
      display: inline-flex;
      gap: 4px;
    }
    .fund-detail-loading .dot-pulse span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      animation: dotPulse 1.2s infinite;
    }
    .fund-detail-loading .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .fund-detail-loading .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Pool Stats ──────────────────────────────────────────── */
    .pool-stats {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
    }
    .pool-stats-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .pool-stats-row:last-child { margin-bottom: 0; }
    .pool-stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
      white-space: nowrap;
      min-width: 32px;
    }
    .pool-bar-chart {
      display: flex;
      flex: 1;
      height: 20px;
      border-radius: 4px;
      overflow: hidden;
      background: #f3f4f6;
    }
    .pool-bar-seg {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      transition: width 0.4s ease;
    }
    .pool-bar-seg.stock { background: #3b82f6; }
    .pool-bar-seg.mixed { background: #8b5cf6; }
    .pool-bar-seg.bond { background: #10b981; }
    .pool-bar-seg.money { background: #f59e0b; }
    .pool-bar-seg.qdii { background: #ec4899; }
    .pool-bar-seg.other { background: #9ca3af; }
    .pool-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 6px;
    }
    .pool-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .pool-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .pool-total-scale {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
    }
    .pool-total-scale strong {
      color: var(--text);
      font-size: 14px;
    }

    /* ── Compare ───────────────────────────────────────────── */
    .compare-bar {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      box-shadow: 0 4px 16px rgba(0,85,212,0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 100;
      font-size: 14px;
      font-weight: 500;
      animation: fadeInUp 0.2s ease;
    }
    .compare-bar button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .compare-bar button:hover { background: rgba(255,255,255,0.3); }
    .compare-bar .clear-btn { background: none; padding: 6px 8px; opacity: 0.7; }
    .compare-bar .clear-btn:hover { opacity: 1; }
    .compare-modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .compare-modal {
      background: var(--card);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .compare-header {
      position: sticky;
      top: 0;
      background: var(--card);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1;
    }
    .compare-header h3 {
      font-size: 17px;
      font-weight: 600;
    }
    .compare-table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }
    .compare-table th {
      position: sticky;
      top: 52px;
      background: #f9fafb;
      padding: 10px 12px;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .compare-table th:first-child {
      text-align: left;
      color: var(--text-tertiary);
      width: 72px;
    }
    .compare-table td {
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid #f3f4f6;
      font-variant-numeric: tabular-nums;
    }
    .compare-table td:first-child {
      text-align: left;
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
    }
    .compare-table .best {
      color: #dc2626;
      font-weight: 700;
    }
    .compare-fund-name {
      font-size: 12px;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Type Filter Chips ───────────────────────────────────── */
    .filter-chips {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      margin-bottom: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .filter-chips::-webkit-scrollbar { display: none; }
    .filter-chip { flex-shrink: 0; }
    .filter-chip {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }
    .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
    .filter-chip.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .compare-check {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      accent-color: var(--primary);
      vertical-align: middle;
      margin-right: 4px;
    }

    /* ── 3.2 Form Elements ─────────────────────────────────────── */
    .input-group {
      margin-bottom: 14px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input,
    .input-wrap select {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 16px;
      color: var(--text);
      background: var(--card);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      font-family: inherit;
    }
    .input-wrap input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 85, 212, 0.1);
    }
    .input-wrap input::placeholder {
      color: var(--text-tertiary);
    }
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .checkbox-wrap input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    /* ── 3.3 Dropdowns & Suggestions ───────────────────────────── */
    .dropdown {
      position: relative;
    }
    .dropdown-list {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      max-height: 240px;
      overflow-y: auto;
      z-index: 50;
      margin-top: 4px;
    }
    .dropdown-item {
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid var(--border);
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item:active,
    .dropdown-item:hover { background: var(--primary-light); }
    .dropdown-item .product-count {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-left: 8px;
    }
    .suggestions {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      margin-top: 4px;
      max-height: 200px;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
    }
    .suggestion-item {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      transition: background var(--transition);
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:active { background: var(--primary-light); }
    .suggestion-item .code {
      color: var(--primary);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* ── 3.4 Buttons ───────────────────────────────────────────── */
    /* ── 按钮三级体系 — primary / secondary / ghost ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 40px;
      padding: 0 16px;
      border: 1px solid transparent;
      border-radius: var(--r-md);
      font-size: var(--fs-body);
      font-weight: 500;
      cursor: pointer;
      transition: background-color var(--dur) var(--ease),
                  border-color var(--dur) var(--ease),
                  color var(--dur) var(--ease);
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.1px;
    }
    .btn:focus-visible {
      outline: 2px solid var(--brand-ink);
      outline-offset: 2px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Tier 1 — 实心强调 */
    .btn-primary {
      background: var(--brand-ink);
      color: #fff;
      border-color: var(--brand-ink);
    }
    .btn-primary:hover:not(:disabled),
    .btn-primary:active {
      background: var(--brand-ink-hover);
      border-color: var(--brand-ink-hover);
    }
    /* Tier 2 — 描边次级（兼容旧 .btn-outline） */
    .btn-secondary,
    .btn-outline {
      background: var(--paper);
      color: var(--brand-ink);
      border-color: var(--ink-300);
    }
    .btn-secondary:hover:not(:disabled),
    .btn-outline:hover:not(:disabled) {
      border-color: var(--brand-ink);
      background: var(--brand-tint);
    }
    /* Tier 3 — 幽灵无边 */
    .btn-ghost {
      background: transparent;
      color: var(--ink-600);
      border-color: transparent;
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--ink-100);
      color: var(--brand-ink);
    }
    /* 警示（保留红色语义） */
    .btn-danger {
      background: var(--paper);
      color: var(--pos);
      border-color: var(--pos);
    }
    .btn-danger:hover:not(:disabled),
    .btn-danger:active { background: var(--pos-soft); }
    .btn-sm {
      height: 32px;
      padding: 0 12px;
      font-size: var(--fs-sm);
    }
    .btn-block { width: 100%; }
    .icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: transparent;
      color: var(--text-tertiary);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { background: #f3f4f6; }
    .icon-btn.danger:active { background: var(--danger-bg); color: var(--danger); }

    /* ── 3.5 Modals ────────────────────────────────────────────── */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-content {
      background: var(--card);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px 20px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .modal-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* ── 3.6 Tables ────────────────────────────────────────────── */
    .product-section {
      padding: 4px 20px 16px;
      border-top: 1px solid var(--border);
    }
    .product-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      margin-top: 8px;
      border-bottom: 1px solid var(--border);
    }
    .compare-all-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .product-count-label {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .product-list {
      margin-top: 4px;
    }
    .product-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .product-info {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .product-main {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .product-code {
      font-variant-numeric: tabular-nums;
      color: var(--primary);
      font-weight: 500;
      font-size: 13px;
      flex-shrink: 0;
    }
    .product-name {
      font-size: 13px;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .product-type {
      font-size: 11px;
      color: var(--text-tertiary);
      flex-shrink: 0;
      white-space: nowrap;
    }
    .add-product-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .add-product-row input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .add-product-row input:focus {
      border-color: var(--primary);
    }
    .product-search {
      margin-top: 12px;
    }
    .product-search input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
    }
    .preview-section {
      margin-top: 16px;
    }
    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .preview-header h3 {
      font-size: 15px;
      font-weight: 600;
    }
    .preview-count {
      font-size: 13px;
      color: var(--text-tertiary);
    }
    .preview-table {
      width: 100%;
      font-size: 13px;
      border-collapse: collapse;
    }
    .preview-table th {
      text-align: left;
      padding: 8px 6px;
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 12px;
      border-bottom: 1px solid var(--border);
    }
    .preview-table td {
      padding: 8px 6px;
      border-bottom: 1px solid #f3f4f6;
    }
    .preview-table td input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    .preview-table td input:focus { border-color: var(--primary); }
    .preview-table .warn {
      background: #fef3c7;
    }
    .preview-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .preview-table input.name-corrected {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── 3.7 Upload Zones ──────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      background: #fafbfc;
      margin-bottom: 16px;
    }
    .upload-zone:active,
    .upload-zone.dragover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .upload-zone input[type="file"] {
      display: none;
    }
    .upload-icon {
      font-size: 36px;
      margin-bottom: 8px;
    }
    .upload-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .upload-desc {
      font-size: 13px;
      color: var(--text-tertiary);
    }

    /* ── 3.8 Toast & Progress ──────────────────────────────────── */
    .toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      background: var(--paper);
      color: var(--ink-800);
      padding: 10px 18px 10px 22px;
      border: 1px solid var(--ink-200);
      border-left: 3px solid var(--brand-ink);
      border-radius: var(--r-md);
      box-shadow: var(--sh-2);
      font-size: var(--fs-body);
      z-index: 1000;
      opacity: 0;
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.toast-success { border-left-color: var(--ok); }
    .toast.toast-error { border-left-color: var(--pos); }
    .toast.toast-warn { border-left-color: var(--warn); }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
      margin: 12px 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .vstatus {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
    }
    .vstatus-checking { color: var(--text-tertiary); font-size: 12px; letter-spacing: -2px; }
    .vstatus-ok  { background: var(--success); color: #fff; cursor: pointer; }
    .vstatus-err { background: var(--danger); color: #fff; }

    /* ═══════════════════════════════════════════════════════════════
       Section 4 · Utilities & Responsive
       ═══════════════════════════════════════════════════════════════ */

    /* ── 4.1 Utility Classes ───────────────────────────────────── */
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .mb-12 { margin-bottom: 12px; }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .text-sm { font-size: 13px; }
    .text-muted { color: var(--text-tertiary); }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-tertiary);
    }
    .empty-state .empty-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      color: var(--ink-300);
    }
    .empty-state .empty-icon svg { width: 100%; height: 100%; display: block; }
    .empty-state p {
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── 4.2 Animations ────────────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeInUp 0.3s ease forwards;
    }

    /* ── 4.3 Scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

    /* ── 4.4 Desktop / Responsive ──────────────────────────────── */
    @media (max-width: 400px) {
      .returns-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
    @media (min-width: 640px) {
      .container { padding: 24px; }
      .header { padding: 20px 24px; }
      .header h1 { font-size: 18px; }
      .header-subtitle { font-size: 13px; }
    }

    /* ── 4.5 Login Page ────────────────────────────────────────── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at top, rgba(15, 42, 63, 0.04) 0%, transparent 60%),
        var(--ink-050);
      padding: 20px;
    }
    .login-card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      padding: 40px 32px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .login-card .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
    }
    .login-card .logo svg { width: 100%; height: 100%; display: block; }
    .login-card h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .login-card .subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 28px;
    }
    .login-card .input-wrap {
      margin-bottom: 16px;
    }
    .login-card .input-wrap input {
      text-align: center;
      letter-spacing: 2px;
    }
    .login-error {
      color: var(--danger);
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 20px;
    }
    .login-card .btn { width: 100%; }
  </style>
</head>
<body>

<div id="app">
  <!-- Toast -->
  <div class="toast" :class="{show: toast.visible}">{{ toast.message }}</div>

  <!-- ═══════════════════════════════════════════════════════════
       Login Gate — unauthenticated users see ONLY this
       ═══════════════════════════════════════════════════════════ -->
  <div v-if="!authenticated" class="login-page">
    <div class="login-card">
      <div class="logo" v-html="ICONS.brandMark"></div>
      <h2>中欧基金</h2>
      <div class="subtitle">机构销售工作台</div>
      <div class="input-wrap">
        <input
          type="password"
          v-model="loginPassword"
          placeholder="请输入访问密码"
          @keyup.enter="handleLogin"
          ref="loginInput"
          autocomplete="current-password"
        >
      </div>
      <div class="login-error">{{ loginError }}</div>
      <button class="btn btn-primary" @click="handleLogin" :disabled="loginLoading">
        {{ loginLoading ? '验证中...' : '进入系统' }}
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       Main Application — only rendered when authenticated
       ═══════════════════════════════════════════════════════════ -->
  <template v-if="authenticated">

    <!-- Header with user info & logout -->
    <div class="header">
      <div class="header-title">
        <h1><span>中欧基金</span></h1>
        <div class="header-subtitle">产品池查询</div>
      </div>
      <div class="header-right">
        <div class="avatar">Z</div>
        <button class="logout-btn" @click="handleLogout">退出</button>
      </div>
    </div>

    <!-- Query View -->
    <div class="container" v-if="currentView === 'query'">
      <!-- Institution Selector -->
      <div class="input-group">
        <label>选择机构客户</label>
        <div class="dropdown">
          <div class="input-wrap">
            <input
              type="text"
              v-model="instSearchText"
              @focus="showInstDropdown = true"
              @input="showInstDropdown = true"
              placeholder="搜索或选择机构..."
            >
          </div>
          <div class="dropdown-list" v-if="showInstDropdown && filteredInstitutions.length > 0" @mousedown.prevent>
            <div
              class="dropdown-item"
              v-for="inst in filteredInstitutions"
              :key="inst.id"
              @click="selectInstitution(inst)"
            >
              {{ inst.name }}
              <span class="product-count">{{ inst.products.length }}只产品</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty state guide -->

async function sha256(message) {
  const msgBuffer = new TextEncoder().encode(message);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function getSession() {
  try {
    const raw = localStorage.getItem(LS_SESSION);
    if (!raw) return null;
    const session = JSON.parse(raw);
    if (Date.now() - session.ts > SESSION_TTL_MS) {
      localStorage.removeItem(LS_SESSION);
      return null;
    }
    return session;
  } catch { return null; }
}

function createSession() {
  const session = { ts: Date.now(), token: crypto.randomUUID() };
  localStorage.setItem(LS_SESSION, JSON.stringify(session));
  return session;
}

function destroySession() {
  localStorage.removeItem(LS_SESSION);
}

// ── Request signing: adds X-Signature header to make raw API calls harder ──
// HMAC-like signature: SHA-256(secret + timestamp + action)
async function signRequest(action) {
  const ts = Math.floor(Date.now() / 30000); // 30-second window
  return await sha256(SIGN_SECRET + ':' + ts + ':' + action);
}

// ── Unified error handler ──────────────────────────────────────────────────

}

}

function cacheSet(data) {
  try {

  } catch { /* quota exceeded — ignore */ }
}

function normalizeCode(code) {

function fuzzyMatch(query, target) {
  if (!query) return { match: true, score: 0 };
  query = query.toLowerCase().trim();
  target = target.toLowerCase();
  if (target === query) return { match: true, score: 100 };
  if (target.startsWith(query)) return { match: true, score: 80 };
  if (target.includes(query)) return { match: true, score: 60 };
  if (/^\d+$/.test(query) && target.startsWith(query)) return { match: true, score: 70 };
  let qi = 0;
  for (let ti = 0; ti < target.length && qi < query.length; ti++) {
    if (target[ti] === query[qi]) qi++;
  }
  if (qi === query.length) return { match: true, score: 40 };
  return { match: false, score: 0 };
}

function jsonp(url, callbackParam = 'callback') {
  return new Promise((resolve, reject) => {
    const cbName = '_cb_' + Date.now() + '_' + Math.floor(Math.random() * 9999);
    const timer = setTimeout(() => {
      reject(new Error('请求超时，请检查网络连接'));
      cleanup();
    }, 10000);
    function cleanup() {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = (data) => {
      clearTimeout(timer);
      resolve(data);
      cleanup();
    };
    const script = document.createElement('script');
    script.src = url + (url.includes('?') ? '&' : '?') + callbackParam + '=' + cbName;
    script.onerror = () => {
      clearTimeout(timer);
      reject(new Error('网络请求失败，请稍后重试'));
      cleanup();
    };
    document.head.appendChild(script);
  });
}
