    managerIndex() {
      // 触发对 meta 缓存版本的依赖 —— meta 到齐后重算
      void this._fundMetaCacheVersion;
      const idx = new Map(); // managerName -> aggregated
      const fundToInsts = new Map(); // code -> Set(instId)
      // 第一遍：建立 code → 机构集合
      for (const inst of this.institutions) {
        for (const p of (inst.products || [])) {
          const code = String(p.code || '').trim();
          if (!code) continue;
          if (!fundToInsts.has(code)) fundToInsts.set(code, new Set());
          fundToInsts.get(code).add(inst.id);
        }
      }
      // 第二遍：对每只基金取经理（优先 product.manager，其次缓存 managerDetails）
      const seenFundPerManager = new Map(); // managerName -> Set<code>
      for (const [code, instSet] of fundToInsts.entries()) {
        // 找一条代表性 product 以获取 name/type/manager
        let repProduct = null;
        let meta = null;
        for (const inst of this.institutions) {
          const p = (inst.products || []).find(x => String(x.code || '').trim() === code);
          if (p) { repProduct = p; break; }
        }
        // 注意：_fundMetaCache 以 bare code（去 .OF 后缀）为键
        meta = (this._fundMetaCache && this._fundMetaCache[this.bareCode(code)]) || null;
        // 经理名集合
        const mgrNames = new Set();
        if (repProduct && repProduct.manager) {
          String(repProduct.manager).split(/[,，、\/\s]+/).filter(Boolean).forEach(n => mgrNames.add(n));
        }
        if (meta && Array.isArray(meta.managerDetails)) {
          meta.managerDetails.forEach(m => m.name && mgrNames.add(m.name));
        }
        if (mgrNames.size === 0) continue;

        const oneYearReturn = meta && meta.returns ? meta.returns['1y'] : null;
        const type = (repProduct && repProduct.type) || (meta && meta.type) || '';
        const name = (repProduct && repProduct.name) || (meta && meta.name) || '';

        for (const mgr of mgrNames) {
          if (!idx.has(mgr)) idx.set(mgr, { name: mgr, funds: [], instIds: new Set() });
          const entry = idx.get(mgr);
          if (!seenFundPerManager.has(mgr)) seenFundPerManager.set(mgr, new Set());
          if (seenFundPerManager.get(mgr).has(code)) continue;
          seenFundPerManager.get(mgr).add(code);
          entry.funds.push({
            code, name, type,
            oneYearReturn,
            instCount: instSet.size
          });
          instSet.forEach(id => entry.instIds.add(id));
        }
      }
      // 转数组并汇总
      const arr = [];
      for (const entry of idx.values()) {
        arr.push({
          name: entry.name,
          fundCount: entry.funds.length,
          instCount: entry.instIds.size,
          funds: entry.funds.sort((a, b) => (b.oneYearReturn || -999) - (a.oneYearReturn || -999))
        });
      }
      arr.sort((a, b) => b.fundCount - a.fundCount || b.instCount - a.instCount);
      return arr;
    },
    filteredManagers() {
      const list = this.managerIndex;

      if (!q) return list;
      return list.filter(m => fuzzyMatch(q, m.name).match);

    selectedManagerFunds() {

    quickFilterChips() {
      if (!this.selectedInstitution) return [];
      const products = this.selectedInstitution.products || [];
      // chip 仅表达"一级分类"（按投资标的性质）——
      // 流动性结构（定开）/ 成立时间（新发）属于正交维度，不应与一级分类并排
      const counts = { all: products.length, 债券: 0, QDII: 0, 股票: 0, 混合: 0, 货币: 0, 其他: 0 };
      for (const p of products) {
        const cls = this.classifyProduct(p);
        if (counts[cls] != null) counts[cls]++;
      }
      const order = ['all', '债券', '股票', '混合', 'QDII', '货币', '其他'];
      const labelMap = { all: '全部' };
      return order
        .filter(k => counts[k] > 0)
        .map(k => ({ key: k, label: labelMap[k] || k, count: counts[k] }));
    },

    // ── M3-F2.2 Comparison ─────────────────────────────────────
    compareSelectedInsts() {
      return this.compareSelectedInstIds
        .map(id => this.institutions.find(i => i.id === id))
        .filter(Boolean);
    },
    comparisonResult() {
      const selected = this.compareSelectedInsts;
      if (selected.length < 2) return null;
      // code -> { product, inInsts: Set<instId> }
      const fundMap = new Map();
      for (const inst of selected) {
        for (const p of (inst.products || [])) {
          const code = String(p.code || '').trim();
          if (!code) continue;
          if (!fundMap.has(code)) fundMap.set(code, { product: p, inInsts: new Set() });
          fundMap.get(code).inInsts.add(inst.id);
        }
      }
      const intersect = []; // 全部机构都有
      const perInstOnly = {}; // instId -> [product]
      const heatRanking = []; // N 家对比时用
      selected.forEach(i => { perInstOnly[i.id] = []; });
      for (const [code, info] of fundMap.entries()) {
        const coverage = info.inInsts.size;
        heatRanking.push({ code, product: info.product, coverage });
        if (coverage === selected.length) {
          intersect.push(info.product);
        } else if (coverage === 1) {
          const onlyId = [...info.inInsts][0];
          perInstOnly[onlyId].push(info.product);
        }
      }
      heatRanking.sort((a, b) => b.coverage - a.coverage);
      return {
        selected,
        intersect,
        perInstOnly,
        heatRanking: selected.length >= 3 ? heatRanking : null
      };
    }
  },

      codes.forEach(code => {
        const bare = this.bareCode(code);
        const entry = items[bare];
        if (entry && isFreshMeta(entry)) return; // 已新鲜 → 跳过
        // 进队列，不 await — 并发池自动 4 路处理（低优先级，让位用户触发的请求）
        fetchFundMeta(bare, { priority: 'low' }).catch(() => {});
      });
    },

    async saveInst(inst) {
      const ok = await DB.upsert(inst);
      if (ok) {
        // Sync local cache after successful save
        cacheSet(this.institutions);
      } else {
        this.showToast('保存失败，数据已缓存到本地');
      }
    },

    // ── Toast ────────────────────────────────────────────────────
    showToast(msg) {
      if (this.toast.timer) clearTimeout(this.toast.timer);
      this.toast.message = msg;
      this.toast.visible = true;
      this.toast.timer = setTimeout(() => { this.toast.visible = false; }, 2000);
    },

    // ── View switching ───────────────────────────────────────────
    switchView(view) {
      this.currentView = view;
      this.queryResult = null;
      this.resultVisible = false;
      this.fundDetail = null;
      this.previewProducts = [];
      this.clearCompare();
      this.poolStatsInst = null;
      this.poolStats = null;
      this.productTypeFilter = '';
    },

    // ═══ Query View ══════════════════════════════════════════════
    selectInstitution(inst) {
      this.selectedInstitution = inst;
      this.instSearchText = inst.name;
      this.showInstDropdown = false;
      this.fundQuery = '';
      this.quickFilter = 'all';
      this.queryResult = null;
      this.resultVisible = false;
      this.fundSuggestions = [];
      this.fundTags = [];
      this.fundTagsLoading = false;
      this.fundDetail = null;
      nextTick(() => {
        if (this.$refs.fundInput) this.$refs.fundInput.focus();
      });
      // M4 · idle-time index build for fast lookup on large pools
      this._buildInstIndex(inst);
    },

    // ── M4: 搜索索引（code hashmap + 2-gram 倒排） ──────────────
    _buildInstIndex(inst) {
      if (!inst) return;
      const run = () => {
        try {
          const codeMap = new Map();
          const nameGrams = new Map(); // 2-gram → Set<productCode>
          for (const p of (inst.products || [])) {
            const code = String(p.code || '').trim();
            if (code) codeMap.set(normalizeCode(code), p);
            const nm = String(p.name || '').toLowerCase();
            for (let i = 0; i < nm.length - 1; i++) {
              const g = nm.slice(i, i + 2);
              if (!nameGrams.has(g)) nameGrams.set(g, new Set());
              nameGrams.get(g).add(code);
            }
          }
          inst._searchIndex = { codeMap, nameGrams };
        } catch (e) {
          console.warn('build index failed', e);
        }
      };
      if (typeof requestIdleCallback === 'function') {
        requestIdleCallback(run, { timeout: 500 });
      } else {
        setTimeout(run, 50);
      }
    },

    onFundQueryInput() {
      // 重置状态放在首轮即时触发，避免"输入时旧结果闪烁"
      this.queryResult = null;
      this.resultVisible = false;
      this.matchedFund = null;
      this.fundTags = [];
      this.fundTagsLoading = false;
      this.fundDetail = null;
      // 纯数字代码命中时立即执行，保留即时响应
      const qRaw = this.fundQuery.trim();
      if (/^\d{3,6}$/.test(normalizeCode(qRaw)) && this.quickFilter === 'all') {
        clearTimeout(this._fundQueryDebounceTimer);
        this._doFundQuery();
        return;
      }
      clearTimeout(this._fundQueryDebounceTimer);
      this._fundQueryDebounceTimer = setTimeout(() => this._doFundQuery(), 180);
    },

    _doFundQuery() {
      if (!this.selectedInstitution) {
        this.fundSuggestions = [];
        return;
      }
      const hasQ = !!this.fundQuery.trim();
      const filter = this.quickFilter;
      // 如果既没输入文字也没激活非默认 chip，则清空建议
      if (!hasQ && filter === 'all') {
        this.fundSuggestions = [];
        return;
      }
      const q = hasQ ? normalizeCode(this.fundQuery.trim()) : '';
      // M4 · 纯数字代码走 O(1) 索引命中路径
      if (hasQ && /^\d{3,6}$/.test(q) && filter === 'all'
          && this.selectedInstitution._searchIndex) {
        const hit = this.selectedInstitution._searchIndex.codeMap.get(q);
        if (hit) {
          this.fundSuggestions = [{ ...hit, score: 1000 }];
          return;
        }
      }
      const results = [];
      for (const p of this.selectedInstitution.products) {
        // 先应用 quickFilter
        if (filter !== 'all') {
          if (this.classifyProduct(p) !== filter) continue;
        }
        if (!hasQ) {
          results.push({ ...p, score: 1 });
          continue;
        }
        const nameMatch = fuzzyMatch(this.fundQuery.trim(), p.name);
        const codeMatch = fuzzyMatch(q, p.code);
        const mgrMatch = p.manager ? fuzzyMatch(this.fundQuery.trim(), p.manager) : { match: false, score: 0 };
        const bestScore = Math.max(nameMatch.score, codeMatch.score, mgrMatch.score);
        if (nameMatch.match || codeMatch.match || mgrMatch.match) {
          results.push({ ...p, score: bestScore });
        }
      }
      results.sort((a, b) => b.score - a.score);
      this.fundSuggestions = results.slice(0, hasQ ? 8 : 40);
    },

    selectFund(fund) {
      this.fundQuery = fund.code + ' ' + fund.name;
      this.fundSuggestions = [];
      this.matchedFund = fund;
      this.queryResult = 'investable';
      this.fundTags = [];
      this.fundTagsLoading = true;
      this.fundDetail = null;
      this.fundDetailStale = false;
      this.fundDetailRefreshing = false;
      nextTick(() => { this.resultVisible = true; });
      this.loadFundTags(fund.code);
    },

    checkFund() {
      if (!this.selectedInstitution || !this.fundQuery.trim()) return;
      const q = this.fundQuery.trim();
      const qNorm = this.normalizeCode(q);
      const found = this.selectedInstitution.products.find(p =>
        p.code === q || p.code === qNorm || p.name === q || p.name.includes(q) || p.code.startsWith(q)
      );
      if (found) {
        this.matchedFund = found;
        this.queryResult = 'investable';
        this.fundTags = [];
        this.fundTagsLoading = true;
        this.fundDetail = null;
        this.fundDetailStale = false;
        this.fundDetailRefreshing = false;
        this.loadFundTags(found.code);
      } else {
        this.matchedFund = null;
        this.queryResult = 'not-investable';
        this.fundTags = [];
        this.fundTagsLoading = false;
        this.fundDetail = null;
      }
      this.fundSuggestions = [];
      nextTick(() => { this.resultVisible = true; });
    },

    async loadFundTags(code) {
      const bare = this.bareCode(code);
      if (!this._fundMetaCache) this._fundMetaCache = {};
      // 1) 内存缓存（同会话）命中
      if (this._fundMetaCache[bare]) {
        const cached = this._fundMetaCache[bare];
        this.fundTags = generateFundTags(cached);
        this.fundDetail = cached;
        this.fundDetailStale = false;
        this.fundDetailRefreshing = false;
        this.fundTagsLoading = false;
        return;
      }
      // 2) 持久化缓存（localStorage）— Stale-while-revalidate
      const persisted = readCachedMeta(bare);
      let needRefresh = true;
      if (persisted && persisted.meta) {
        this.fundDetail = persisted.meta;
        this.fundTags = generateFundTags(persisted.meta);
        this.fundTagsLoading = false;
        const fresh = isFreshMeta(persisted);
        this.fundDetailStale = !fresh;
        if (fresh) {
          // 新鲜 → 也写入内存缓存，不再请求
          this._fundMetaCache[bare] = persisted.meta;
          this.fundDetailRefreshing = false;
          needRefresh = false;
        } else {
          this.fundDetailRefreshing = true;
        }
      } else {
        // 无持久化缓存：不清 refreshing（refreshCurrentFund 可能刚置 true），
        // 交给后续网络分支或 catch 负责复位
        this.fundDetailStale = false;
      }
      if (!needRefresh) return;
      // 3) 后台拉取最新
      try {
        const [meta, apiType, holdings] = await Promise.all([
          fetchFundMeta(bare, { force: !!persisted }),
          fetchFundType(bare),
          fetchFundHoldings(bare)
        ]);
        if (apiType) meta.type = apiType;
        if (holdings && holdings.length > 0) meta.topHoldings = holdings;
        this._fundMetaCache[bare] = meta;
        this._fundMetaCacheVersion++;
        try { cacheMeta(bare, meta); } catch(e) {}
        if (this.matchedFund && this.bareCode(this.matchedFund.code) === bare) {
          this.fundTags = generateFundTags(meta);
          this.fundDetail = meta;
          this.fundDetailStale = false;
          this.fundDetailRefreshing = false;
          this.fundTagsLoading = false;
        }
      } catch (e) {
        this.fundTagsLoading = false;
        this.fundDetailRefreshing = false;
        if (!persisted) this.fundTags = [];
      }
    },

    // 手动刷新当前基金（同时清除内存缓存 + localStorage，保证真正发请求）
    refreshCurrentFund() {
      if (!this.matchedFund || this.fundDetailRefreshing) return;
      const bare = this.bareCode(this.matchedFund.code);
      if (this._fundMetaCache) delete this._fundMetaCache[bare];
      try {
        const items = loadMetaCache();
        if (items[bare]) { delete items[bare]; saveMetaCache(items); }
      } catch(e) {}
      this.fundDetailStale = false;
      this.fundDetailRefreshing = true;
      const token = ++this._refreshToken;
      const watchdog = setTimeout(() => {
        // 仅当版本号未被新刷新顶掉、且仍在 loading 时才复位
        if (this._refreshToken === token && this.fundDetailRefreshing) {
          this.fundDetailRefreshing = false;
          this.showToast('刷新超时，请稍后重试');
        }
      }, 12000);
      const p = this.loadFundTags(this.matchedFund.code);
      if (p && typeof p.finally === 'function') {
        p.finally(() => clearTimeout(watchdog));
      } else {
        // 兜底：即便不是 Promise，也在 watchdog 超时后自然复位
      }
    },

    // ═══ Manage View ═════════════════════════════════════════════
    toggleExpand(id) {
      this.expandedInst = this.expandedInst === id ? null : id;
      this.productSearchText = '';
      this.productTypeFilter = '';
      this.clearCompare();
      // Auto-backfill types when expanding if any products are missing type
      if (this.expandedInst === id) {
        const inst = this.institutions.find(i => i.id === id);
        if (inst && inst.products.some(p => !p.type)) {
          this.backfillTypes(inst);
        }
        if (inst && inst.products.some(p => !p.manager)) {
          this.backfillManagers(inst);
        }
      }
    },

    filteredProducts(inst) {
      let list = inst.products;
      if (this.productTypeFilter) {
        list = list.filter(p => this.classifyProduct(p) === this.productTypeFilter);
      }
      if (!this.productSearchText.trim()) return list;
      return list.filter(p =>
        fuzzyMatch(this.productSearchText, p.name).match ||
        fuzzyMatch(this.productSearchText, p.code).match ||
        (p.manager && fuzzyMatch(this.productSearchText, p.manager).match)
      );
    },

    async addInstitution() {
      const name = this.newInstName.trim();
      if (!name) { this.showToast('请输入机构名称'); return; }
      if (this.institutions.some(i => i.name === name)) {
        this.showToast('该机构已存在');
        return;
      }
      const now = new Date().toISOString();
      const inst = { id: 'inst_' + Date.now(), name, products: [], createdAt: now, updatedAt: now };
      if (await DB.upsert(inst)) {
        this.institutions.push(inst);
        cacheSet(this.institutions);
        this.newInstName = '';
        this.showAddInstModal = false;
        this.showToast('机构添加成功');
      } else {
        this.showToast('添加失败，请检查网络');
      }
    },

    confirmDeleteInst(inst) {
      this.deleteTarget = inst;
    },

    async deleteInstitution() {
      if (await DB.remove(this.deleteTarget.id)) {
        this.institutions = this.institutions.filter(i => i.id !== this.deleteTarget.id);
        cacheSet(this.institutions);
        if (this.selectedInstitution && this.selectedInstitution.id === this.deleteTarget.id) {
          this.selectedInstitution = null;
          this.instSearchText = '';
        }
        this.deleteTarget = null;
        this.showToast('已删除');
      } else {
        this.deleteTarget = null;
        this.showToast('删除失败，请检查网络');
      }
    },

    async addProduct(inst) {
      const code = this.normalizeCode(this.newProductCode.trim());
      const name = this.newProductName.trim().replace(/\s+/g, '');
      if (!code || !name) { this.showToast('请填写代码和名称'); return; }
      if (inst.products.some(p => p.code === code)) {
        this.showToast('该代码已存在');
        return;
      }
      // Fetch fund meta (type + manager) at add time and persist with product
      const bare = this.bareCode(code);
      let fundType = null;
      let manager = null;
      try {
        const meta = await fetchFundMeta(bare);
        if (meta) {
          fundType = meta.type;
          manager = extractManagerNames(meta);
        }
      } catch (_) {
        try { fundType = await fetchFundType(bare); } catch (_) {}
      }
      const product = { code, name };
      if (fundType) product.type = fundType;
      if (manager) product.manager = manager;
      inst.products.push(product);
      inst.updatedAt = new Date().toISOString();
      await this.saveInst(inst);
      this.newProductCode = '';
      this.newProductName = '';
      this.showToast('产品已添加');
    },

    async backfillTypes(inst) {
      const missing = inst.products.filter(p => !p.type);
      if (missing.length === 0) return;
      this.backfillLoading = true;
      await _loadFundTypeMap(); // ensure map is ready
      let filled = 0;
      for (const p of missing) {
        const t = fetchFundType(this.bareCode(p.code));
        // fetchFundType returns sync when map is ready
        const type = t instanceof Promise ? await t : t;
        if (type) { p.type = type; filled++; }
      }
      if (filled > 0) {
        inst.updatedAt = new Date().toISOString();
        await this.saveInst(inst);
      }
      this.backfillLoading = false;
      this.showToast(`分类补全完成：${filled}/${missing.length} 成功`);
    },

    async backfillManagers(inst) {
      const missing = inst.products.filter(p => !p.manager);
      if (missing.length === 0) return;
      this.backfillManagerLoading = true;
      this.backfillManagerProgress = `0/${missing.length}`;
      let filled = 0;
      for (let i = 0; i < missing.length; i++) {
        const p = missing[i];
        this.backfillManagerProgress = `${i + 1}/${missing.length}`;
        try {
          const meta = await fetchFundMeta(this.bareCode(p.code));
          const names = extractManagerNames(meta);
          if (names) { p.manager = names; filled++; }
          if (!p.type && meta && meta.type) { p.type = meta.type; }
        } catch (_) {}
      }
      if (filled > 0) {
        inst.updatedAt = new Date().toISOString();
        await this.saveInst(inst);
      }
      this.backfillManagerLoading = false;
      this.backfillManagerProgress = '';
      this.showToast(`经理补全完成：${filled}/${missing.length} 成功`);
    },

    async removeProduct(inst, code) {
      inst.products = inst.products.filter(p => p.code !== code);
      inst.updatedAt = new Date().toISOString();
      await this.saveInst(inst);
    },

    // ── Helper methods for templates ─────────────────────────────
    formatReturn(val) {
      if (val == null || val === '') return '--';
      const n = parseFloat(val);
      if (isNaN(n)) return '--';
      return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    },
    returnClass(val) {
      if (val == null || val === '') return 'flat';
      const n = parseFloat(val);
      if (isNaN(n) || n === 0) return 'flat';
      return n > 0 ? 'up' : 'down';
    },
    // 最大回撤：恒为负或 0，显示时带负号
    formatDrawdown(val) {
      if (val == null || val === '') return '--';
      const n = parseFloat(val);
      if (isNaN(n)) return '--';
      if (n === 0) return '0.00%';
      return n.toFixed(2) + '%';
    },

    // ── Pool Stats (Feature 2) ───────────────────────────────────
    async loadPoolStats(inst) {
      if (this.poolStatsInst === inst.id) {
        this.poolStatsInst = null;
        this.poolStats = null;
        return;
      }
      this.poolStatsInst = inst.id;
      // Classify products by name heuristic first
      const typeMap = { '股票': 0, '混合': 0, '债券': 0, '货币': 0, 'QDII': 0, '其他': 0 };
      const colorMap = { '股票': '#3b82f6', '混合': '#8b5cf6', '债券': '#10b981', '货币': '#f59e0b', 'QDII': '#ec4899', '其他': '#9ca3af' };
      const clsMap = { '股票': 'stock', '混合': 'mixed', '债券': 'bond', '货币': 'money', 'QDII': 'qdii', '其他': 'other' };
      for (const p of inst.products) {
        const cls = this.classifyProduct(p);
        if (cls in typeMap) typeMap[cls]++;
        else typeMap['其他']++;
      }
      const total = inst.products.length || 1;
      const segments = Object.entries(typeMap)
        .filter(([, c]) => c > 0)
        .map(([type, count]) => ({
          type, count,
          pct: Math.round(count / total * 100),
          color: colorMap[type],
          cls: clsMap[type]
        }))
        .sort((a, b) => b.count - a.count);
      this.poolStats = { segments, totalScale: null, loading: true };
      // Async: sample up to 20 products for scale estimation
      const sample = inst.products.slice(0, 20);
      let scaleSum = 0, scaleCount = 0;
      const batchSize = 5;
      for (let i = 0; i < sample.length; i += batchSize) {
        const batch = sample.slice(i, i + batchSize);
        const results = await Promise.allSettled(
          batch.map(async p => {
            try {
              const resp = await fetch(
                'https://fundmobapi.eastmoney.com/FundMNewApi/FundMNFInfo?plat=Android&appType=ttjj&product=EFund&Version=1&deviceid=1&Fcodes=' + this.bareCode(p.code)
              );
              const json = await resp.json();
              const fgs = json?.Datas?.[0]?.FundScale;
              if (fgs) { const m = fgs.match(/([\d.]+)/); if (m) return parseFloat(m[1]); }
              return null;
            } catch (_) { return null; }
          })
        );
        for (const r of results) {
          if (r.status === 'fulfilled' && r.value != null) {
            scaleSum += r.value;
            scaleCount++;
          }
        }
      }
      if (this.poolStatsInst === inst.id && this.poolStats) {
        if (scaleCount > 0) {
          const avgScale = scaleSum / scaleCount;
          const estimated = (avgScale * inst.products.length).toFixed(1);
          this.poolStats.totalScale = estimated;
        }
        this.poolStats.loading = false;
      }
    },

    // ── Product Type Filter (Feature 4) ──────────────────────────
    getProductTypes(inst) {
      const types = new Set();
      for (const p of inst.products) {
        types.add(this.classifyProduct(p));
      }
      return [...types].sort();
    },

    classifyProduct(p) {
      // 统一走权威表 —— 一次产出一级分类（chip 筛选用）
      return resolveFundClassification(p && p.type, p && p.name).primary;
    },

    // ── Risk Badges (M2) ─────────────────────────────────────────
    // 返回 [{ label, tip }]，基于类型 / 规模 / 经理任职 / 名称派生
    computeRiskBadges(detail, fund) {
      const badges = [];
      if (!detail && !fund) return badges;
      const type = (detail && detail.type) || (fund && fund.type) || '';
      const name = (detail && detail.name) || (fund && fund.name) || '';
      // 1) QDII — 外汇风险
      if (/QDII|海外|全球|美国|港股通|纳斯达克/.test(type + ' ' + name)) {
        badges.push({ label: '外汇风险', tip: 'QDII 基金涉及外汇敞口，受汇率波动影响' });
      }
      // 2) 规模偏小 — 清盘风险
      if (detail && typeof detail.fundSize === 'number' && detail.fundSize > 0 && detail.fundSize < 0.5) {
        // fundSize 约定单位为亿元；< 0.5 亿 = 5000 万
        badges.push({ label: '规模偏小', tip: '最新披露规模 < 5000 万元，关注清盘风险' });
      } else if (detail && typeof detail.fundSize === 'string') {
        const m = detail.fundSize.match(/([\d.]+)\s*(亿|万)/);
        if (m) {
          const num = parseFloat(m[1]);
          const unit = m[2];
          const yi = unit === '万' ? num / 10000 : num;
          if (yi > 0 && yi < 0.5) {
            badges.push({ label: '规模偏小', tip: '最新披露规模 < 5000 万元，关注清盘风险' });
          }
        }
      }
      // 3) 经理任职 < 1 年
      if (detail && Array.isArray(detail.managerDetails) && detail.managerDetails.length > 0) {
        const younger = detail.managerDetails.some(m => {
          if (!m.workTime) return false;
          const yrMatch = String(m.workTime).match(/(\d+)\s*年/);
          const dayMatch = String(m.workTime).match(/(\d+)\s*天/);
          if (yrMatch && parseInt(yrMatch[1]) >= 1) return false;
          if (dayMatch && parseInt(dayMatch[1]) >= 365) return false;
          return true;
        });
        if (younger) {
          badges.push({ label: '经理任职 < 1 年', tip: '现任基金经理任职未满 1 年，业绩可比性有限' });
        }
      }
      // 4) 封闭/定开产品
      if (/定开|持有期|封闭|\d+年期|\d+个月期/.test(name)) {
        badges.push({ label: '封闭期', tip: '产品存在封闭期或最短持有期，流动性受限' });
      }
      // 5) FOF — 二层费率
      if (/FOF/i.test(type) || /FOF/.test(name)) {
        badges.push({ label: 'FOF · 二层费率', tip: 'FOF 产品底层基金可能产生额外管理费' });
      }
      return badges;
    },

    // ── Export Institution (M2) ──────────────────────────────────
    // format: 'excel' | 'markdown' | 'print'
    async exportInstitution(inst, format) {
      if (!inst || !inst.products || inst.products.length === 0) {
        this.showToast('该机构产品池为空');
        return;
      }
      const today = new Date().toISOString().slice(0, 10);
      // 构造导出数据 — 尽量使用已缓存的字段
      const rows = inst.products.map(p => {
        const meta = (this._fundMetaCache && this._fundMetaCache[this.bareCode(p.code)]) || {};
        return {
          代码: p.code,
          名称: p.name || meta.name || '',
          类型: p.type || meta.type || this.classifyProduct(p),
          基金经理: p.manager || (Array.isArray(meta.managerDetails) ? meta.managerDetails.map(m => m.name).join('/') : ''),
          最新净值: meta.latestNav != null ? Number(meta.latestNav).toFixed(4) : '',
          近1年收益: (meta.returns && meta.returns['1y'] != null) ? Number(meta.returns['1y']).toFixed(2) + '%' : '',
          近1年最大回撤: (meta.drawdowns && meta.drawdowns['1y'] != null) ? Number(meta.drawdowns['1y']).toFixed(2) + '%' : '',
          规模: meta.fundSize || '',
          备注: p.note || ''
        };
      });

      if (format === 'excel') {
        try {
          const ws = XLSX.utils.json_to_sheet(rows);
          // 自适应列宽
          const cols = Object.keys(rows[0] || {});
          ws['!cols'] = cols.map(k => ({
            wch: Math.max(k.length + 2, ...rows.map(r => String(r[k] || '').length + 2))
          }));
          const wb = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(wb, ws, inst.name.slice(0, 28));
          const filename = `${inst.name}_产品池_${today}.xlsx`;
          XLSX.writeFile(wb, filename);
          this.showToast('Excel 已导出');
        } catch (e) {
          console.error(e);
          this.showToast('导出失败');
        }
        return;
      }

      if (format === 'markdown') {
        const cols = Object.keys(rows[0] || {});
        let md = `# ${inst.name} · 产品池清单\n\n`;
        md += `_数据截至 ${today} · 共 ${rows.length} 只产品_\n\n`;
        md += '| ' + cols.join(' | ') + ' |\n';
        md += '|' + cols.map(() => '---').join('|') + '|\n';
        rows.forEach(r => {
          md += '| ' + cols.map(c => String(r[c] || '').replace(/\|/g, '\\|')).join(' | ') + ' |\n';
        });
        try {
          await navigator.clipboard.writeText(md);
          this.showToast('Markdown 表已复制到剪贴板');
        } catch (e) {
          // Fallback: 显示一个文本框
          const ta = document.createElement('textarea');
          ta.value = md;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          this.showToast('Markdown 表已复制');
        }
        return;
      }

      if (format === 'print') {
        // 展开该机构，设置打印标识，调用 window.print()
        this.expandedInst = inst.id;
        this.printingInstId = inst.id;
        this.printingInstName = inst.name;
        this.printingDate = today;
        await this.$nextTick();
        setTimeout(() => {
          window.print();
          setTimeout(() => {
            this.printingInstId = null;
          }, 500);
        }, 150);
        return;
      }
    },

    openManager(name) {

    _backfillManagerFunds(name) {
      const entry = this.managerIndex.find(m => m.name === name);
      if (!entry) return;
      if (!this._fundMetaCache) this._fundMetaCache = {};
      let pending = 0;
      entry.funds.forEach(f => {
        const bare = this.bareCode(f.code);
        if (this._fundMetaCache[bare]) return;
        const persisted = readCachedMeta(bare);
        if (persisted && persisted.meta && isFreshMeta(persisted)) {
          this._fundMetaCache[bare] = persisted.meta;
          pending++;
          return;
        }
        pending++;
        fetchFundMeta(bare).then(meta => {
          this._fundMetaCache[bare] = meta;
          try { cacheMeta(bare, meta); } catch(e) {}
          this._fundMetaCacheVersion++;
        }).catch(() => {});
      });
      if (pending) this._fundMetaCacheVersion++; // 立即触发一次重算，让 LS 命中立即显示
    },

    toggleAllCompare(inst, event) {

    isAllCompareChecked(inst) {
      const filtered = this.filteredProducts(inst);
      return filtered.length > 0 && filtered.length <= 3 && filtered.every(p => this.compareSet.has(p.code));
    },
    clearCompare() {
      this.compareList = [];
      this.compareSet = new Set();
      this.showCompareModal = false;

    },
    isBestReturn(fund, key) {
      if (this.compareData.length < 2) return false;
      const vals = this.compareData.map(f => f.returns && f.returns[key] != null ? parseFloat(f.returns[key]) : -Infinity);
      const max = Math.max(...vals);
      if (max === -Infinity) return false;
      const v = fund.returns && fund.returns[key] != null ? parseFloat(fund.returns[key]) : -Infinity;
      return v === max;
    },
    async showCompareModal_() {
      this.showCompareModal = true;
      this.compareLoading = true;
      this.compareData = [];
      const results = await Promise.allSettled(
        this.compareList.map(async p => {
          const bare = this.bareCode(p.code);
          if (!this._fundMetaCache) this._fundMetaCache = {};
          if (this._fundMetaCache[bare]) {
            return { code: p.code, ...this._fundMetaCache[bare] };
          }
          const [meta, apiType] = await Promise.all([
            fetchFundMeta(bare),
            fetchFundType(bare)
          ]);
          if (apiType) meta.type = apiType;
          this._fundMetaCache[bare] = meta;
          return { code: p.code, ...meta };
        })
      );
      this.compareData = results
        .filter(r => r.status === 'fulfilled')
        .map(r => r.value);
      this.compareLoading = false;
    },

    // ── 共用：从一段文本里提取所有 (基金代码, 名称) 对 ────────────
    //   关键：用 matchAll 抓全部代码（不再只取第一个），
    //   用相邻代码之间的文本切片做名字提取，避免相邻产品互相吞名。
    _extractFundEntries(rawText) {
      // 完整的 6 位带后缀；6 位 + OF；以及 6 位末尾跟分隔/非数字字符
      const RE = /(\d{6}\s*[.。·]\s*[A-Za-z]{2}|\d{6}\s*(?:OF|of|oF|Of)|\d{6}(?=[^\d]|$))/g;
      const entries = [];
      const seen = new Set();
      const lines = String(rawText || '').split(/\n+/);
      for (let raw of lines) {
        if (!raw) continue;
        const line = this.cleanOcrText(raw);
        if (!line) continue;
        const matches = [...line.matchAll(RE)];
        if (matches.length === 0) continue;
        for (let mi = 0; mi < matches.length; mi++) {
          const m = matches[mi];
          const codeRaw = m[1].replace(/\s+/g, '');
          const code = this.normalizeCode(codeRaw);
          if (seen.has(code)) continue;
          // 名字候选：本次代码末尾 → 下个代码起点之间的文本
          const startIdx = m.index + m[0].length;
          const endIdx = mi + 1 < matches.length ? matches[mi + 1].index : line.length;
          let between = line.slice(startIdx, endIdx);
          // 第一个代码若后面无文字，回退到代码之前的文本
          let nameCand = this._firstChineseName(between);
          if (!nameCand && mi === 0) {
            const before = line.slice(0, m.index);
            nameCand = this._lastChineseName(before);
          }
          // 仍无名字，再尝试从代码之后最近的中文起头串里拿
          if (!nameCand) nameCand = this._firstChineseName(between);
          seen.add(code);
          entries.push({
            code,
            name: (nameCand || '未识别名称').replace(/\s+/g, ''),
            selected: true,
            verifyStatus: null,
            officialName: '',
            nameCorrected: false,
          });
        }
      }
      return entries;
    },
    // 取字符串里第一个 "中文/英文 起头 + 中英数字" 的连续片段
    _firstChineseName(s) {
      if (!s) return '';
      // 先丢弃前导分隔
      const cleaned = s.replace(/^[\s|｜,，、;；()（）\[\]【】\-—:：\/\\.]+/, '');
      const m = cleaned.match(/[一-龥][一-龥A-Za-z0-9（）()]*/);
      return m ? m[0] : '';
    },
    _lastChineseName(s) {
      if (!s) return '';
      const m = s.match(/[一-龥][一-龥A-Za-z0-9（）()]*$/);
      return m ? m[0] : '';
    },

    // ── Excel ────────────────────────────────────────────────────
    handleExcelUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      this.parseExcel(file);
      event.target.value = '';
    },
    handleExcelDrop(event) {
      this.excelDragover = false;
      const file = event.dataTransfer.files[0];
      if (file) this.parseExcel(file);
    },
    async parseExcel(file) {
      try {
        const data = await file.arrayBuffer();
        const workbook = XLSX.read(data);
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        let codeCol = -1, nameCol = -1, startRow = 0;
        // 在前 20 行内找表头（之前是 10 行，太紧）
        for (let r = 0; r < Math.min(rows.length, 20); r++) {
          if (!rows[r]) continue;
          const row = rows[r].map(c => String(c || ''));
          let localCode = -1, localName = -1;
          for (let c = 0; c < row.length; c++) {
            const cell = row[c];
            if (localCode < 0 && /代码|编码|代号|证券代码/.test(cell)) localCode = c;
            if (localName < 0 && /名称|基金名|产品名|简称|证券简称/.test(cell)) localName = c;
          }
          if (localCode >= 0 && localName >= 0) {
            codeCol = localCode; nameCol = localName; startRow = r + 1;
            break;
          }
        }
        // 仍未找到表头：尝试通过"哪一列大多数像 6 位代码"自动定位
        if (codeCol < 0) {
          const colHits = {};
          const probe = Math.min(rows.length, 30);
          for (let r = 0; r < probe; r++) {
            if (!rows[r]) continue;
            for (let c = 0; c < rows[r].length; c++) {
              const v = String(rows[r][c] || '').trim().replace(/'/g, '');
              if (/^\d{6}(\.\w{2,3})?$/.test(v) || /^\d{6}$/.test(v)) {
                colHits[c] = (colHits[c] || 0) + 1;
              }
            }
          }
          const best = Object.entries(colHits).sort((a, b) => b[1] - a[1])[0];
          if (best && best[1] >= 2) {
            codeCol = parseInt(best[0], 10);
            startRow = 0;
          } else {
            codeCol = 0; startRow = 1;
          }
          if (nameCol < 0) nameCol = codeCol === 0 ? 1 : 0;
        }

        const products = [];
        const seen = new Set();
        for (let r = startRow; r < rows.length; r++) {
          if (!rows[r]) continue;
          let code = String(rows[r][codeCol] || '').trim().replace(/'/g, '');
          let name = String(rows[r][nameCol] || '').trim().replace(/\s+/g, '');
          // 代码不在预期列时，尝试整行扫一下 6 位数字代码
          if (!/^\d{3,6}(\.\w{2,3})?$/.test(code)) {
            for (let c = 0; c < rows[r].length; c++) {
              const v = String(rows[r][c] || '').trim().replace(/'/g, '');
              if (/^\d{6}(\.\w{2,3})?$/.test(v)) { code = v; break; }
            }
          }
          if (!code) continue;
          code = this.normalizeCode(code);
          if (seen.has(code)) continue;
          seen.add(code);
          // 允许名称缺失：保留代码，名字由后续核对补全
          products.push({ code, name: name || '', selected: true, verifyStatus: null, officialName: '', nameCorrected: false });
        }

        if (products.length === 0) {
          this.showToast('未识别到有效产品数据');
          return;
        }
        this.previewProducts = products;
        this.showToast(`已识别 ${products.length} 条产品`);
        this.verifyPreviewProducts();
      } catch (e) {
        this.showToast('Excel解析失败: ' + handleError('parseExcel', e));
      }
    },

    // ── PDF (lazy-loaded) ────────────────────────────────────────
    handlePdfUpload(event) {
      const file = event.target.files[0];
      event.target.value = '';
      if (file) this._parsePdfFile(file);
    },
    handlePdfDrop(event) {
      this.pdfDragover = false;
      const file = event.dataTransfer && event.dataTransfer.files[0];
      if (!file) return;
      if (!/\.pdf$/i.test(file.name) && file.type !== 'application/pdf') {
        this.showToast('请拖入 PDF 文件');
        return;
      }
      this._parsePdfFile(file);
    },
    async _parsePdfFile(file) {
      this.isProcessing = true;
      this.ocrProgress = 0;
      this.ocrStatus = '正在加载PDF引擎...';

      try {
        const pdfjsLib = await loadPdfJs();
        this.ocrStatus = '正在解析PDF...';

        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const totalPages = pdf.numPages;
        let fullText = '';

        for (let i = 1; i <= totalPages; i++) {
          this.ocrProgress = Math.round((i / totalPages) * 100);
          this.ocrStatus = `解析第 ${i}/${totalPages} 页...`;
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          // 按 Y 坐标重组行（PDF 坐标 Y 自下向上），同 Y 的 item 按 X 升序拼接
          const linesMap = new Map();
          for (const it of content.items) {
            if (!it || !it.str) continue;
            const y = Math.round((it.transform && it.transform[5]) || 0);
            const x = (it.transform && it.transform[4]) || 0;
            if (!linesMap.has(y)) linesMap.set(y, []);
            linesMap.get(y).push({ x, str: it.str });
          }
          const ys = [...linesMap.keys()].sort((a, b) => b - a); // 顶部 → 底部
          for (const y of ys) {
            const items = linesMap.get(y).sort((a, b) => a.x - b.x);
            fullText += items.map(it => it.str).join(' ') + '\n';
          }
          fullText += '\n';
        }

        const products = this._extractFundEntries(fullText);

        this.isProcessing = false;
        this.ocrStatus = '';
        if (products.length > 0) {
          this.previewProducts = products;
          this.showToast(`已从PDF中识别 ${products.length} 条产品`);
          this.verifyPreviewProducts();
        } else {
          this.showToast('未在PDF中识别到有效的基金代码（如005787.OF或005787）');
        }
      } catch (e) {
        this.isProcessing = false;
        this.ocrStatus = '';
        this.showToast('PDF解析失败: ' + handleError('handlePdfUpload', e));
      }
    },

    // ── Image preprocessing ──────────────────────────────────────
    async preprocessImage(file) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const maxDim = Math.max(img.width, img.height);
          const scale = maxDim < 1800 ? Math.min(3, 1800 / maxDim) : 1;
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);

          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(img, 0, 0, w, h);
          URL.revokeObjectURL(url);

          const id = ctx.getImageData(0, 0, w, h);
          const d = id.data;
          for (let i = 0; i < d.length; i += 4) {
            const g = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
            const v = Math.min(255, Math.max(0, Math.round((g - 128) * 1.5 + 128)));
            d[i] = d[i + 1] = d[i + 2] = v;
          }
          ctx.putImageData(id, 0, 0);
          canvas.toBlob(resolve, 'image/png');
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
        img.src = url;
      });
    },

    // ── OCR (lazy-loaded Tesseract.js) ───────────────────────────
    handleImageOCR(event) {
      const file = event.target.files[0];
      event.target.value = '';
      if (file) this._processImageFile(file);
    },
    handleImageDrop(event) {
      this.imageDragover = false;
      const file = event.dataTransfer && event.dataTransfer.files[0];
      if (!file) return;
      if (!/^image\//.test(file.type) && !/\.(jpe?g|png|gif|bmp|webp)$/i.test(file.name)) {
        this.showToast('请拖入图片文件');
        return;
      }
      this._processImageFile(file);
    },
    async _processImageFile(file) {
      this.isProcessing = true;
      this.ocrProgress = 0;
      this.ocrStatus = '正在加载OCR引擎...';

      try {
        // Lazy load Tesseract.js only when actually needed
        await loadTesseract();

        this.ocrStatus = '正在预处理图片...';
        const enhanced = await this.preprocessImage(file);

        this.ocrStatus = '正在初始化OCR引擎...';
        const worker = await Tesseract.createWorker(['chi_sim', 'eng'], 1, {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              this.ocrProgress = Math.round(m.progress * 100);
              this.ocrStatus = `识别中... ${this.ocrProgress}%`;
            } else if (m.status === 'loading language traineddata') {
              this.ocrStatus = '正在下载语言包...';
              this.ocrProgress = Math.round(m.progress * 100);
            }
          }
        });

        await worker.setParameters({ tessedit_pageseg_mode: '6' });
        const { data: { text } } = await worker.recognize(enhanced);
        await worker.terminate();

        const products = this._extractFundEntries(text);

        this.previewProducts = products;
        this.isProcessing = false;
        if (products.length > 0) {
          this.ocrStatus = '';
          this.showToast(`识别完成，共 ${products.length} 条记录`);
          this.verifyPreviewProducts();
        } else {
          this.ocrStatus = '';
          this.showToast('未识别到有效的基金代码（如005787.OF或005787）');
        }
      } catch (e) {
        this.isProcessing = false;
        this.ocrStatus = '';
        this.showToast('OCR识别失败: ' + handleError('handleImageOCR', e));
      }
    },

    // ── OCR text cleaning (8-step pipeline) ──────────────────────
    cleanOcrText(text) {
      text = text.replace(/[\u2018\u2019\u201c\u201d\u0022\u0027\u0060\uff02\uff07\u2033\u2032]/g, '');
      text = text.replace(/^[\s\u3000\u3002\u00b7\u2022\uff0e\uff01\uff1f\u30fb\u300c\u300d\u300e\u300f\u3010\u3011\u300a\u300b]+/, '');
      text = text.replace(/[\s\u3000\u3002\u00b7\u2022\uff0e\uff01\uff1f\u30fb\u300c\u300d\u300e\u300f\u3010\u3011\u300a\u300b]+$/, '');
      text = text.replace(/(\d)[\s\u3000]+(\d)/g, '$1$2');
      text = text.replace(/(\d)[lI\|](\d)/g, '$11$2');
      text = text.replace(/(\d)[lI\|](\d)/g, '$11$2');
      text = text.replace(/(\d)[Oo](\d)/g, '$10$2');
      text = text.replace(/(\d)[Oo](\d)/g, '$10$2');
      text = text.replace(/\bO(\d{5})\b/g, '0$1');
      text = text.replace(/\b[lI](\d{5})\b/g, '1$1');
      text = text.replace(/(\d{6})\s*[.\u3002·,，]\s*(OF|of|oF|Of)/g, '$1.$2');
      text = text.replace(/(\d{6})\s+(OF|of|oF|Of)\b/g, '$1.$2');
      text = text.replace(/\s+[-+]?\d{1,6}[.,]\d{2,4}%?\s*$/, '');
      text = text.replace(/\s+\d{4}[-\/]\d{2}[-\/]\d{2}\s*$/, '');
      return text;
    },

    bareCode(code) {
      return code.replace(/\.\w{2,3}$/i, '');
    },

    fundNameKey(name) {
      return name.replace(/\s+/g, '').replace(/[A-Za-z0-9（）()【】]/g, '').slice(0, 6);
    },

    // ── Fund verification ────────────────────────────────────────
    async verifySingleFund(p) {
      const bare = this.bareCode(p.code);
      try {
        const data = await jsonp(
          'https://fundsuggest.eastmoney.com/FundSearch/api/FundSearchAPI.ashx?m=1&key=' +
          encodeURIComponent(bare)
        );

        const list = Array.isArray(data?.Datas) ? data.Datas
          : Array.isArray(data) ? data
          : Array.isArray(data?.EastmoneyFund_OverAll?.FundBaseInfoList) ? data.EastmoneyFund_OverAll.FundBaseInfoList
          : Array.isArray(data?.Data) ? data.Data
          : [];

        let hit = list.find(f => (f.CODE || f.FundCode || f.FCODE || f.code || '') === bare);
        if (!hit && list.length === 1) hit = list[0];
        if (!hit) hit = list.find(f => String(f.CODE || f.FundCode || f.FCODE || f.code || '').startsWith(bare));

        if (hit) {
          const officialName = (hit.NAME || hit.FundFullName || hit.FundName || hit.name || '').replace(/\s+/g, '');
          if (officialName) {
            p.officialName = officialName;
            p.name = officialName;
            p.nameCorrected = true;
          }
          p.verifyStatus = 'ok';
          return;
        }

        const gz = await fundgzLookup(bare);
        if (gz && gz.fundcode === bare) {
          const officialName = (gz.name || '').replace(/\s+/g, '');
          if (officialName) {
            p.officialName = officialName;
            p.name = officialName;
            p.nameCorrected = true;
          }
          p.verifyStatus = 'ok';
        } else {
          p.verifyStatus = 'notfound';
        }
      } catch (_) {
        p.verifyStatus = null;
      }
    },

    async verifyPreviewProducts() {
      const snapshot = this.previewProducts;
      const items = snapshot.filter(p => this.isValidCode(p.code));
      items.forEach(p => { p.verifyStatus = 'checking'; });
      const BATCH = 5;
      for (let i = 0; i < items.length; i += BATCH) {
        if (this.previewProducts !== snapshot) break;
        await Promise.all(items.slice(i, i + BATCH).map(p => this.verifySingleFund(p)));
      }
    },

    normalizeCode(code) {
      code = code.trim();
      code = code.replace(/[\u3002·,，]/g, '.');
      code = code.replace(/\s*\.\s*/g, '.');
      const noSepMatch = code.match(/^(\d{6})\s*(OF|of|oF|Of)$/);
      if (noSepMatch) return noSepMatch[1] + '.OF';
      if (/^\d{6}$/.test(code)) return code + '.OF';
      if (/^\d{1,5}$/.test(code)) return code.padStart(6, '0') + '.OF';
      const shortWithSuffix = code.match(/^(\d{1,5})\.(\w{2})$/);
      if (shortWithSuffix) return shortWithSuffix[1].padStart(6, '0') + '.' + shortWithSuffix[2].toUpperCase();
      if (/^\d{6}\.\w{2}$/.test(code)) return code.toUpperCase();
      return code;
    },

    isValidCode(code) {
      return /^\d{1,6}(\.\w{2})?$/.test(code);
    },

    async confirmImport() {
      const target = await this.getOrCreateImportTarget();
      if (!target) return;

      // 允许名称缺失（可能核对仍未完成）：用代码兜底，避免静默丢行
      const selected = this.previewProducts
        .filter(p => p.selected && p.code)
        .map(p => p.name ? p : { ...p, name: p.code });
      const existingCodes = new Set(target.products.map(p => p.code));
      let added = 0, skipped = 0;

      const newProducts = [];
      for (const p of selected) {
        if (existingCodes.has(p.code)) {
          skipped++;
        } else {
          newProducts.push(p);
          existingCodes.add(p.code);
          added++;
        }
      }

      // Assign fund types from preloaded map (sync when map is ready)
      await _loadFundTypeMap();
      for (const p of newProducts) {
        const product = { code: p.code.trim(), name: p.name.trim().replace(/\s+/g, '') };
        const type = fetchFundType(this.bareCode(p.code));
        const resolved = type instanceof Promise ? await type : type;
        if (resolved) product.type = resolved;
        target.products.push(product);
      }

      target.updatedAt = new Date().toISOString();
      await this.saveInst(target);
      this.previewProducts = [];
      this.showToast(`导入完成：新增 ${added} 条${skipped > 0 ? '，跳过 ' + skipped + ' 条重复' : ''}`);
    },

    // ── Data Export/Import ────────────────────────────────────────
    exportData() {
      const data = JSON.stringify(this.institutions, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `机构产品池备份_${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      this.showToast('备份已下载');
    },

    importBackup(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) throw new Error('格式错误');
          for (const inst of data) {
            await DB.upsert(inst);
          }
          this.institutions = await DB.load();
          this.showToast(`已导入 ${data.length} 个机构`);
        } catch (err) {
          this.showToast('备份文件格式错误');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }
  },

  watch: {
    showAddInstModal(v) {
      if (v) nextTick(() => { if (this.$refs.newInstInput) this.$refs.newInstInput.focus(); });
    }
  },

  async mounted() {
    // If already authenticated (valid session), load data immediately
    if (this.authenticated) {
      await this.loadData();
    } else {
      // Auto-focus login input
      nextTick(() => { if (this.$refs.loginInput) this.$refs.loginInput.focus(); });
    }

    // Close dropdowns on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        this.showInstDropdown = false;
        this.showImportInstDropdown = false;
      }
      if (!e.target.closest('.export-menu-wrap')) {
        this.exportMenuInstId = null;
      }
    });

    // Enter key handler for fund query
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && this.currentView === 'query' && this.fundQuery) {
        if (this.fundSuggestions.length > 0) {
          this.selectFund(this.fundSuggestions[0]);
        } else {
          this.checkFund();
        }
      }
    });
  }
}).mount('#app');
</script>
</body>
</html>
